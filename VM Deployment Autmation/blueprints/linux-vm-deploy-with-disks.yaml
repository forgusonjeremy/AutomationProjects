name: linux-vm-deploy-with-disks
version: 1.4
formatVersion: 1

###############################################################################
# Blueprint: linux-vm-deploy-with-disks
# OS:        RHEL Linux
# Disks:     1–N additional data disks on SCSI Controller 1
# Notes:     - Use this blueprint for VMs requiring additional data disks
#            - Paired with catalog item "Linux VM - Deploy with Data Disks"
#            - cloudConfig block intentionally omitted — hostname set via
#              name: property and VMware Tools VCFA injection (S4 fix)
#            - Extensibility POST_PROVISION subscription triggers
#              workflow_VMDeployParent with additionalDisks JSON payload
#            - OS disk remains on SCSI_Controller_0 (VCFA default)
#            - All additional disks land on SCSI_Controller_1
#            - unitNumber matches additionalDisks array index (count.index)
#            - disk.EnableUUID must be TRUE on base image template (V3)
#            - Filesystem selection:
#                sizeGb < 2048  → ext4
#                sizeGb >= 2048 → xfs
#              (selection logic handled in workflow_MountFormatDisks_Linux)
#
# Token replacement required before deployment (M1):
#   {{projectId}}     - VCFA project ID
#   {{imageMapping}}  - VCFA image mapping name for Linux base image
#   {{flavor}}        - VCFA flavor / compute size name
#   {{datacenter}}    - vCenter datacenter name
#   {{cluster}}       - vCenter cluster name
#   {{network}}       - DVPortgroup name
#   {{folder}}        - Full VM folder path (e.g. Datacenter/vm/Production)
###############################################################################

inputs:
  vmHostname:
    type: string
    title: VM Hostname
    description: "VM display name and guest hostname. Must be a valid Linux hostname (RFC 1123). Max 63 characters."
    minLength: 1
    maxLength: 63
    pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?$'

  osType:
    type: string
    title: OS Type
    description: "Operating system type. Used by post-provision workflow."
    default: linux
    enum:
      - linux
    readOnly: true

  vcpuCount:
    type: integer
    title: vCPU Count
    default: 2
    minimum: 1
    maximum: 64

  memoryMB:
    type: integer
    title: Memory (MB)
    default: 4096
    minimum: 1024
    maximum: 524288

  additionalDisks:
    type: array
    title: Additional Data Disks
    description: "Define one entry per additional disk. Disks are provisioned in array order on SCSI Controller 1. Filesystem: ext4 < 2048 GB, xfs >= 2048 GB."
    minItems: 1
    items:
      type: object
      properties:
        mountPoint:
          type: string
          title: Mount Point
          description: "Absolute path for mount point (e.g. /data, /logs, /opt/app). Must start with /."
          pattern: '^\/[a-zA-Z0-9/_\-]+$'
        driveLabel:
          type: string
          title: Filesystem Label
          description: "Filesystem label. Max 12 characters (safe for both ext4 and xfs). No spaces."
          maxLength: 12
          pattern: '^[a-zA-Z0-9_\-]+$'
        sizeGb:
          type: integer
          title: Size (GB)
          description: "Disk size in GB. Disks >= 2048 GB use xfs. Disks < 2048 GB use ext4."
          minimum: 1
          maximum: 65536

resources:
  vm:
    type: Cloud.vSphere.Machine
    dependsOn:
      - additionalDisk
    properties:
      name: '${input.vmHostname}'
      image: '{{imageMapping}}'
      flavor: '{{flavor}}'
      cpuCount: '${input.vcpuCount}'
      totalMemoryMB: '${input.memoryMB}'
      datacenter: '{{datacenter}}'
      resourceGroupName: '{{cluster}}'
      folderName: '{{folder}}'
      networks:
        - network: '${resource.network.id}'
          assignment: static

  additionalDisk:
    type: Cloud.vSphere.Disk
    allocatePerInstance: true
    count: '${length(input.additionalDisks)}'
    properties:
      capacityGb: '${input.additionalDisks[count.index].sizeGb}'
      SCSIController: SCSI_Controller_1
      unitNumber: '${count.index}'

  network:
    type: Cloud.vSphere.Network
    properties:
      networkType: existing
      name: '{{network}}'
