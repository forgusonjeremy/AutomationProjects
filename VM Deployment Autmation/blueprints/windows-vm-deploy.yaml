name: windows-vm-deploy
version: 1.4
formatVersion: 1

###############################################################################
# Blueprint: windows-vm-deploy
# OS:        Windows Server
# Disks:     Zero additional disks
# Notes:     - Use this blueprint for VMs with OS disk only
#            - Paired with catalog item "Windows VM - Standard Deploy"
#            - Extensibility POST_PROVISION subscription triggers
#              workflow_VMDeployParent with additionalDisks = ""
#
# Token replacement required before deployment (M1):
#   {{projectId}}     - VCFA project ID
#   {{imageMapping}}  - VCFA image mapping name for Windows base image
#   {{flavor}}        - VCFA flavor / compute size name
#   {{datacenter}}    - vCenter datacenter name
#   {{cluster}}       - vCenter cluster name
#   {{network}}       - DVPortgroup name
#   {{folder}}        - Full VM folder path (e.g. Datacenter/vm/Production)
###############################################################################

inputs:
  vmHostname:
    type: string
    title: VM Hostname
    description: "VM display name and guest hostname. Alphanumeric and hyphens only. Max 15 chars for Windows NetBIOS compatibility."
    minLength: 1
    maxLength: 15
    pattern: '^[a-zA-Z0-9\-]+$'

  osType:
    type: string
    title: OS Type
    description: "Operating system type. Used by post-provision workflow."
    default: windows
    enum:
      - windows
    readOnly: true

  vcpuCount:
    type: integer
    title: vCPU Count
    default: 2
    minimum: 1
    maximum: 64

  memoryMB:
    type: integer
    title: Memory (MB)
    default: 4096
    minimum: 1024
    maximum: 524288

resources:
  vm:
    type: Cloud.vSphere.Machine
    properties:
      name: '${input.vmHostname}'
      image: '{{imageMapping}}'
      flavor: '{{flavor}}'
      cpuCount: '${input.vcpuCount}'
      totalMemoryMB: '${input.memoryMB}'
      datacenter: '{{datacenter}}'
      resourceGroupName: '{{cluster}}'
      folderName: '{{folder}}'
      networks:
        - network: '${resource.network.id}'
          assignment: static

  network:
    type: Cloud.vSphere.Network
    properties:
      networkType: existing
      name: '{{network}}'
