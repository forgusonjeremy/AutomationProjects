name: linux-vm-deploy
version: 1.4
formatVersion: 1

###############################################################################
# Blueprint: linux-vm-deploy
# OS:        RHEL Linux
# Disks:     Zero additional disks
# Notes:     - Use this blueprint for VMs with OS disk only
#            - Paired with catalog item "Linux VM - Standard Deploy"
#            - cloudConfig block intentionally omitted — hostname set via
#              name: property and VMware Tools VCFA injection (S4 fix)
#            - Extensibility POST_PROVISION subscription triggers
#              workflow_VMDeployParent with additionalDisks = ""
#
# Token replacement required before deployment (M1):
#   {{projectId}}     - VCFA project ID
#   {{imageMapping}}  - VCFA image mapping name for Linux base image
#   {{flavor}}        - VCFA flavor / compute size name
#   {{datacenter}}    - vCenter datacenter name
#   {{cluster}}       - vCenter cluster name
#   {{network}}       - DVPortgroup name
#   {{folder}}        - Full VM folder path (e.g. Datacenter/vm/Production)
###############################################################################

inputs:
  vmHostname:
    type: string
    title: VM Hostname
    description: "VM display name and guest hostname. Must be a valid Linux hostname (RFC 1123). Max 63 characters."
    minLength: 1
    maxLength: 63
    pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?$'

  osType:
    type: string
    title: OS Type
    description: "Operating system type. Used by post-provision workflow."
    default: linux
    enum:
      - linux
    readOnly: true

  vcpuCount:
    type: integer
    title: vCPU Count
    default: 2
    minimum: 1
    maximum: 64

  memoryMB:
    type: integer
    title: Memory (MB)
    default: 4096
    minimum: 1024
    maximum: 524288

resources:
  vm:
    type: Cloud.vSphere.Machine
    properties:
      name: '${input.vmHostname}'
      image: '{{imageMapping}}'
      flavor: '{{flavor}}'
      cpuCount: '${input.vcpuCount}'
      totalMemoryMB: '${input.memoryMB}'
      datacenter: '{{datacenter}}'
      resourceGroupName: '{{cluster}}'
      folderName: '{{folder}}'
      networks:
        - network: '${resource.network.id}'
          assignment: static

  network:
    type: Cloud.vSphere.Network
    properties:
      networkType: existing
      name: '{{network}}'
