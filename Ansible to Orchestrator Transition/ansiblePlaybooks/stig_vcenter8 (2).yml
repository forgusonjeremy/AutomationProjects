- name: vmware-vcsa-8.0-stig-ansible-hardening
  hosts: all

  vars:
    run_create_backups: true
    photon_version: '4'
    run_sshd_banner_issue: true
    var_syslog_authpriv_log: '/var/log/audit/sshinfo.log'

    # Turn specific controls on/off by setting the value to true or false
    
    # Create backups of files?
    run_create_backups: true
    # VCLD-80-000001
    run_max_connections: true
    # VCLD-80-000004
    run_ssl_engine: true
    # VCLD-80-000005
    run_mod_accesslog: true
    # VCLD-80-000010
    run_accesslog_format: true
    # VCLD-80-000019
    run_log_files_permissions: true
    # VCLD-80-000022
    run_rsyslog_conf: true
    # VCLD-80-000031
    run_mimetype_use_xattr: true
    # VCLD-80-000033
    run_url_access_deny: true
    # VCLD-80-000034
    run_mod_webdav: true
    # VCLD-80-000035
    run_max_keep_alive: true
    # VCLD-80-000040
    run_ssl_key_permissions: true
    # VCLD-80-000042
    run_server_fips_mode: true
    # VCLD-80-000060
    run_server_max_fds: true
    # VCLD-80-000061
    run_text_mime_utf8: true
    # VCLD-80-000062
    run_dir_listing: true
    # VCLD-80-000063
    run_mod_status: true
    # VCLD-80-000064
    run_debug_log_request: true
    # VCLD-80-000096
    run_honor_ssl_cipher_order: true
    # VCLD-80-000097
    run_ssl_disable_client_reneg: true
    # VCLD-80-000098
    run_server_tag: true
    # VCLD-80-000099
    # VCLD-80-000100
    # VCLD-80-000101
    # VCLD-80-000102

  roles:
    #- role: misc
    - role: eam
    - role: envoy
    - role: lookup
    - role: perfcharts
    - role: postgresql
    - role: sts
    - role: ui
    - role: vami
    
    - role: vmware-photon-3.0-stig-ansible-hardening
      vars:
        # Set to true or false to configure dod banner for ssh
        run_sshd_banner_issue: false
        # Disable N/A Photon Controls
        run_set_syslog_server: false
        run_usr_lib_perms: false
        run_set_ntp_server: false
      when:
        - photon_version == '3'

    - role: vmware-photon-4.0-stig-ansible-hardening
      vars:
        # Set to true or false to configure dod banner for ssh
        run_etc_issue_dod: false
        # Disable N/A Photon Controls
        run_rsyslog_server: false
        run_enable_selinux: false
        run_selinux_install: false
        run_usr_lib_perms: false
        run_time_sync: false
        run_systemd_tmp_mount: false
        run_pam_add_pwquality_so: false
        run_install_aide: false
        run_aide_config: false
      when:
        - photon_version == '4'

    - role: vmware-photon-5.0-stig-ansible-hardening
      vars:
        # Set to true or false to configure dod banner for ssh
        run_etc_issue_dod: false
        # Disable N/A Photon Controls
        run_rsyslog_server: false
        run_enable_selinux: false
        run_selinux_install: false
        run_usr_lib_perms: false
        run_time_sync: false
        run_systemd_tmp_mount: false
        run_install_aide: false
        run_aide_config: false
      when:
        - photon_version == '5'

