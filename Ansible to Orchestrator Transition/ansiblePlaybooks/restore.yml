---
- name: Restore Router Configs from Gitea in Branches
  hosts: "{{ _group }}"
  gather_facts: True
  vars:
    #ansible_network_cli_ssh_type: paramiko

  tasks:
    - debug:
        msg: "branch: {{branch_name}}"
      delegate_to: "localhost"
      run_once: true

    - name: Retrieve a repository from a distant location and make it available to the local EE
      ansible.scm.git_retrieve:
        origin:
          url: "https://{{ username }}:{{ token }}@{{ git_url }}"
        parent_directory: /tmp/
        branch:
          name: "{{branch_name}}"
          duplicate_detection: no  
      delegate_to: "localhost"
      run_once: true

    - name: enable SCP for Cisco
      ansible.netcommon.cli_config:
        config: "feature scp-server"
        commit: True
      when: inventory_hostname in groups['n9kv']

    - name: copy from server to device
      cisco.nxos.nxos_file_copy:
        local_file: '/tmp/{{gitlab_project}}/network_backup_files/{{ inventory_hostname }}.txt'
        remote_file: '{{ inventory_hostname }}-startup-replace-{{ branch_name }}'
      when: inventory_hostname in groups['n9kv']

    - name: Overwrite startup config - archive
      cisco.nxos.nxos_config:
        lines:
        - 'archive'
      when: inventory_hostname in groups['n9kv'] 

    - name: Overwrite startup config - overwrite
      cisco.ios.ios_command:
        commands:
         - command: 'configure replace bootflash:///{{ inventory_hostname }}-startup-replace-{{ branch_name }}'
      when: inventory_hostname in groups['n9kv']

    - name: run command to remove {{ inventory_hostname }}-startup-replace-{{ branch_name }}
      cisco.nxos.nxos_command:
        commands:
         - configure terminal
         - command: delete bootflash:{{ inventory_hostname }}-startup-replace-{{ branch_name }}
           prompt: 'Do you want to delete' 
           answer: y
      when: inventory_hostname in groups['n9kv']
    
   
      
  