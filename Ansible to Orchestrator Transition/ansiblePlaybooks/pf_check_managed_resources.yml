---
# Check Managed Resources - Fixed for actual PowerFlex Manager API structure
# Use this to determine if your resources support actual password updates

- name: Check PowerFlex Managed Resources
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    # Set in AAP survey:
    # - pfm_host
    # - pfm_username
    # - pfm_password

  tasks:
    - name: Authenticate to PowerFlex Manager
      ansible.builtin.uri:
        url: "https://{{ pfm_host }}/rest/auth/login"
        method: POST
        body_format: json
        body:
          username: "{{ pfm_username }}"
          password: "{{ pfm_password }}"
        validate_certs: false
        timeout: 30
        status_code: [200, 201]
      register: auth_response
      no_log: true

    - name: Set auth token
      ansible.builtin.set_fact:
        auth_token: "{{ auth_response.json.access_token }}"
      no_log: true

    - name: Get all services
      ansible.builtin.uri:
        url: "https://{{ pfm_host }}/Api/V1/ServiceTemplate"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ auth_token }}"
      register: services

    - name: Get all resource groups (deployments)
      ansible.builtin.uri:
        url: "https://{{ pfm_host }}/Api/V1/ResourceGroup"
        method: GET
        validate_certs: false
        headers:
          Authorization: "Bearer {{ auth_token }}"
      register: resource_groups

    - name: Find deployed services
      ansible.builtin.set_fact:
        deployed_services: "{{ services.json | selectattr('state', 'defined') | selectattr('state', 'equalto', 'DEPLOYED') | list }}"

    - name: Find managed deployments
      ansible.builtin.set_fact:
        managed_deployments: "{{ resource_groups.json.Deployment | selectattr('managedState', 'defined') | selectattr('managedState', 'equalto', 'MANAGED') | list if resource_groups.json.Deployment is defined else [] }}"
        all_deployments: "{{ resource_groups.json.Deployment | list if resource_groups.json.Deployment is defined else [] }}"

    - name: Calculate unmanaged deployments
      ansible.builtin.set_fact:
        unmanaged_deployments: "{{ all_deployments | difference(managed_deployments) }}"

    - name: Display deployed services
      ansible.builtin.debug:
        msg: |
          ========================================
          DEPLOYED SERVICES (Can Update Passwords)
          ========================================
          {% if deployed_services | length > 0 %}
          {% for service in deployed_services %}
          {{ loop.index }}. {{ service.serviceName }}
             Service ID: {{ service.id }}
             State: {{ service.state }}
             Template: {{ service.templateName | default('N/A') }}
             Category: {{ service.category | default('N/A') }}
          
          {% endfor %}
          
          Total: {{ deployed_services | length }} deployed services
          
          ✅ These services support password updates via API!
          ✅ You CAN update actual passwords on hosts
          ✅ Use: update_actual_passwords.yml
          {% else %}
          ❌ No deployed services found
          
          Total services in system: {{ services.json | length }}
          Services with state: {{ services.json | selectattr('state', 'defined') | list | length }}
          Total deployments: {{ all_deployments | length }}
          
          ⚠️  You CANNOT update actual passwords via API
          ⚠️  You can ONLY update PowerFlex Manager's credential store
          {% endif %}
          ========================================

    - name: Display managed deployments
      ansible.builtin.debug:
        msg: |
          ========================================
          MANAGED DEPLOYMENTS
          ========================================
          {% if managed_deployments | length > 0 %}
          {% for dep in managed_deployments %}
          {{ loop.index }}. {{ dep.deploymentName | default('Deployment ' ~ dep.id) }}
             ID: {{ dep.id }}
             State: {{ dep.managedState }}
             Type: {{ dep.serviceTemplate.templateName if dep.serviceTemplate is defined else 'N/A' }}
             Created: {{ dep.createdDate }}
          
          {% endfor %}
          
          Total: {{ managed_deployments | length }} managed deployments
          {% else %}
          No managed deployments found.
          {% endif %}
          ========================================

    - name: Display unmanaged deployments
      ansible.builtin.debug:
        msg: |
          ========================================
          UNMANAGED/DISCOVERED DEPLOYMENTS
          ========================================
          {% if unmanaged_deployments | length > 0 %}
          {% for dep in unmanaged_deployments %}
          {{ loop.index }}. {{ dep.deploymentName | default('Deployment ' ~ dep.id) }}
             ID: {{ dep.id }}
             State: {{ dep.managedState | default('UNMANAGED') }}
             Brownfield: {{ dep.brownfield }}
          
          {% endfor %}
          
          Total: {{ unmanaged_deployments | length }} unmanaged deployments
          
          ⚠️  These do NOT support password updates via API
          ⚠️  Must use credential store updates only
          {% else %}
          All deployments are managed!
          {% endif %}
          ========================================

    - name: Final verdict and recommendations
      ansible.builtin.debug:
        msg: |
          ========================================
          🎯 FINAL VERDICT
          ========================================
          
          Total Services: {{ services.json | length }}
          Total Deployments: {{ all_deployments | length }}
          Deployed Services: {{ deployed_services | length }}
          Managed Deployments: {{ managed_deployments | length }}
          Unmanaged Deployments: {{ unmanaged_deployments | length }}
          
          {% if deployed_services | length > 0 %}
          ✅ YES - You CAN update actual host passwords via API
          
          HOW TO USE:
          1. Use playbook: update_actual_passwords.yml
          2. PowerFlex Manager will SSH to hosts
          3. PFM will change passwords on the actual OS
          4. PFM updates credential store automatically
          
          SERVICES THAT SUPPORT THIS:
          {% for service in deployed_services %}
          - {{ service.serviceName }} ({{ service.state }})
          {% endfor %}
          {% else %}
          ❌ NO - You CANNOT update actual host passwords via API
          
          REASON: No deployed services found
          
          YOUR WORKFLOW MUST BE:
          Step 1: Manually SSH to each host
                  ssh root@hostname
                  passwd
                  (enter new password)
          
          Step 2: Update PowerFlex Manager's credential store
                  Use: aap_powerflex_credential_update.yml
                  This tells PFM the new passwords
          
          THIS IS THE NORMAL WORKFLOW FOR DISCOVERED RESOURCES
          {% endif %}
          
          ========================================
          📋 WHAT YOU HAVE
          ========================================
          
          {% if deployed_services | length > 0 %}
          You have DEPLOYED services (managed by PFM)
          → PFM can control these resources
          → PFM can change passwords on these
          {% else %}
          You have DISCOVERED resources only
          → PFM knows about them but doesn't control them
          → You must manually manage passwords
          → Then tell PFM what the passwords are
          {% endif %}
          
          ========================================

    - name: Save detailed report
      ansible.builtin.copy:
        content: |
          # PowerFlex Manager Resource Analysis
          # Generated: {{ ansible_date_time.iso8601 }}
          
          ## Summary
          Total Services: {{ services.json | length }}
          Total Deployments: {{ all_deployments | length }}
          Deployed Services: {{ deployed_services | length }}
          Managed Deployments: {{ managed_deployments | length }}
          Unmanaged Deployments: {{ unmanaged_deployments | length }}
          
          ## Can Update Actual Passwords via API?
          {% if deployed_services | length > 0 %}
          ✅ YES
          
          You have {{ deployed_services | length }} deployed service(s) that support actual password updates.
          {% else %}
          ❌ NO
          
          You have no deployed services. Your resources are discovered but not managed.
          {% endif %}
          
          ## Deployed Services
          {% if deployed_services | length > 0 %}
          {% for service in deployed_services %}
          {{ loop.index }}. {{ service.serviceName }}
             ID: {{ service.id }}
             State: {{ service.state }}
             Template: {{ service.templateName | default('N/A') }}
             Category: {{ service.category | default('N/A') }}
             
          {% endfor %}
          {% else %}
          None
          {% endif %}
          
          ## Managed Deployments
          {% if managed_deployments | length > 0 %}
          {% for dep in managed_deployments %}
          {{ loop.index }}. {{ dep.deploymentName | default('Deployment ' ~ dep.id) }}
             ID: {{ dep.id }}
             State: {{ dep.managedState }}
             Created: {{ dep.createdDate }}
             
          {% endfor %}
          {% else %}
          None
          {% endif %}
          
          ## Unmanaged Deployments
          {% if unmanaged_deployments | length > 0 %}
          {% for dep in unmanaged_deployments %}
          {{ loop.index }}. {{ dep.deploymentName | default('Deployment ' ~ dep.id) }}
             ID: {{ dep.id }}
             State: {{ dep.managedState | default('UNMANAGED') }}
             Brownfield: {{ dep.brownfield | default('N/A') }}
             
          {% endfor %}
          {% else %}
          None
          {% endif %}
          
          ## Recommendation
          {% if deployed_services | length > 0 %}
          Use: update_actual_passwords.yml
          
          This playbook will:
          - SSH to managed hosts
          - Change passwords on the actual OS
          - Update PowerFlex Manager's credential store
          {% else %}
          Use: aap_powerflex_credential_update.yml
          
          Your workflow:
          1. SSH to each host manually and change password
          2. Run aap_powerflex_credential_update.yml to update PFM's records
          
          This is normal for environments with discovered (not deployed) resources.
          {% endif %}
        dest: /tmp/pfm-resource-analysis.txt
      delegate_to: localhost

    - name: Report saved
      ansible.builtin.debug:
        msg: "Detailed report saved to: /tmp/pfm-resource-analysis.txt"
