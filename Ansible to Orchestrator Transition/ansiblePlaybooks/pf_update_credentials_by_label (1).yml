---
# PowerFlex Manager Credential Update - Target by Exact Label Names
# This version fetches credentials by exact label match using API filtering
# More efficient than pattern matching!

- name: Update PowerFlex Manager Credentials by Label
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    # Variables populated by AAP survey:
    # - pfm_host
    # - pfm_username
    # - pfm_password
    # - new_password
    # - target_labels (comma-separated exact label names, e.g., "cvso26hyp013,cvsoewhyp111,cvsoewhyp112")
    # - credential_type_filter (optional: "OSCredential,ServerCredential" or empty for all)
    # - dry_run (default: false)

    label_list: "{{ target_labels.split(',') | map('trim') | list }}"
    type_filters: "{{ credential_type_filter.split(',') | map('trim') | list if credential_type_filter is defined and credential_type_filter | length > 0 else [] }}"

  tasks:
    - name: Display execution parameters
      ansible.builtin.debug:
        msg: |
          ========================================
          PowerFlex Credential Update - By Label
          ========================================
          Host: {{ pfm_host }}
          User: {{ pfm_username }}
          Mode: {{ 'DRY RUN (Preview Only)' if dry_run | bool else 'LIVE UPDATE' }}
          Target Labels: {{ target_labels }}
          Type Filter: {{ credential_type_filter if credential_type_filter is defined and credential_type_filter | length > 0 else 'All Types' }}
          ========================================

    - name: Authenticate to PowerFlex Manager
      ansible.builtin.uri:
        url: "https://{{ pfm_host }}/rest/auth/login"
        method: POST
        body_format: json
        body:
          username: "{{ pfm_username }}"
          password: "{{ pfm_password }}"
        validate_certs: false
        timeout: 30
        status_code: [200, 201]
        return_content: true
      register: auth_response
      no_log: true
      check_mode: false

    - name: Display authentication error if failed
      ansible.builtin.debug:
        msg: |
          ========================================
          Authentication Failed
          ========================================
          Status: {{ auth_response.status | default('N/A') }}
          URL: https://{{ pfm_host }}/rest/auth/login
          
          Please check:
          - PowerFlex Manager hostname/IP
          - Username and password
          - Network connectivity from AAP to PFM
          ========================================
      when: auth_response.failed | default(false)

    - name: Fail if authentication did not succeed
      ansible.builtin.fail:
        msg: "Authentication failed. See error above."
      when: auth_response.failed | default(false)

    - name: Set auth token fact
      ansible.builtin.set_fact:
        auth_token: "{{ auth_response.json.access_token }}"
      no_log: true

    - name: Display authentication success
      ansible.builtin.debug:
        msg: "✓ Authentication successful"

    - name: Fetch credentials by label
      ansible.builtin.uri:
        url: "https://{{ pfm_host }}/Api/V1/Credential?filter=eq,label,{{ item }}"
        method: GET
        validate_certs: false
        timeout: 30
        status_code: 200
        headers:
          Accept: "application/json"
          Content-Type: "application/json"
          Authorization: "Bearer {{ auth_token }}"
      register: credential_responses
      loop: "{{ label_list }}"
      no_log: true
      check_mode: false

    - name: Combine all fetched credentials
      ansible.builtin.set_fact:
        all_fetched_credentials: "{{ credential_responses.results | map(attribute='json.credentialList') | flatten | list }}"
      no_log: true

    - name: Filter credentials by type (if specified)
      ansible.builtin.set_fact:
        filtered_credentials: >-
          {{
            all_fetched_credentials
            | selectattr('credential.type', 'in', type_filters)
            | list
            if type_filters | length > 0
            else all_fetched_credentials
          }}
      no_log: true

    - name: Display credentials to update
      ansible.builtin.debug:
        msg: |
          ========================================
          Found {{ filtered_credentials | length }} credentials to update:
          {% for item in filtered_credentials %}
          {{ loop.index }}. {{ item.link.title }}
             - Type: {{ item.credential.type }}
             - User: {{ item.credential.username }}
             - ID: {{ item.credential.id }}
          {% endfor %}
          ========================================

    - name: DRY RUN - No updates performed
      ansible.builtin.debug:
        msg: |
          ========================================
          DRY RUN MODE
          ========================================
          No credentials were updated.
          Set dry_run=false to perform actual updates.
          ========================================
      when: dry_run | bool

    - name: Update credentials
      ansible.builtin.uri:
        url: "https://{{ pfm_host }}/Api/V1/Credential/{{ item.credential.id }}"
        method: PUT
        body_format: raw
        body: |
          <asmCredential>
            <serverCredential>
              <type>{{ item.credential.type }}</type>
              <label>{{ item.link.title }}</label>
              <username>{{ item.credential.username }}</username>
              <password>{{ new_password }}</password>
              <communityString>{{ item.credential.communityString | default('') }}</communityString>
            </serverCredential>
          </asmCredential>
        validate_certs: false
        timeout: 30
        status_code: [200, 201]
        headers:
          Accept: "application/json"
          Content-Type: "application/xml"
          Authorization: "Bearer {{ auth_token }}"
      loop: "{{ filtered_credentials }}"
      loop_control:
        label: "{{ item.link.title }}"
      register: update_results
      when: not (dry_run | bool)
      no_log: true

    - name: Display update summary
      ansible.builtin.debug:
        msg: |
          ========================================
          Update Complete
          ========================================
          Total Credentials: {{ filtered_credentials | length }}
          {% if not (dry_run | bool) %}
          Successfully Updated: {{ filtered_credentials | length - (update_results.results | selectattr('failed', 'defined') | selectattr('failed') | list | length) }}
          Failed: {{ update_results.results | selectattr('failed', 'defined') | selectattr('failed') | list | length }}
          {% else %}
          Mode: DRY RUN (no changes made)
          {% endif %}
          ========================================
      when: filtered_credentials | length > 0

    - name: Calculate found and not found labels
      ansible.builtin.set_fact:
        found_labels: "{{ filtered_credentials | map(attribute='link.title') | list }}"
        not_found_labels: "{{ label_list | difference(filtered_credentials | map(attribute='link.title') | list) }}"

    - name: Warn about labels not found
      ansible.builtin.debug:
        msg: |
          ========================================
          WARNING: Labels Not Found
          ========================================
          The following labels were not found:
          {% for label in not_found_labels %}
          - {{ label }}
          {% endfor %}
          
          Please verify:
          - Label names are spelled correctly (case-sensitive)
          - Credentials exist in PowerFlex Manager
          ========================================
      when: not_found_labels | length > 0

    - name: Display no credentials found message
      ansible.builtin.debug:
        msg: |
          ========================================
          No Credentials Found
          ========================================
          None of the specified labels were found:
          {% for label in label_list %}
          - {{ label }}
          {% endfor %}
          
          Please check:
          - Label names are correct (case-sensitive)
          - Credentials exist in PowerFlex Manager
          - You have permission to view these credentials
          ========================================
      when: filtered_credentials | length == 0