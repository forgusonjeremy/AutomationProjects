  - name: Create a new user with Key
    cisco.nxos.nxos_user:
      name: "{{ localAccountname }}"
      sshkey: "{{ lookup('file', '/tmp/{{ inventory_hostname }}{{ folder }}{{pub_key}}') }}"
      sshkey: "{{ ssh_key }}"
      #configured_password: "{{ new_pass }}"
      state: present
      role: "{{ role }}"

  - name: Save config 
    cisco.nxos.nxos_config:
      save_when: always
      