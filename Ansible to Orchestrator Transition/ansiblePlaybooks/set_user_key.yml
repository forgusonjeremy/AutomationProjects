---
- name: Playbook to add new user and key to N9k switch
  hosts: "{{ _groups }}"
  gather_facts: False
  
  vars:
    new_pass: 'MyNotSecurePassword'
  tasks:
  # - name: Enable SCP for N9kv
  #   ansible.netcommon.cli_config:
  #     config: "feature scp-server"
  #     commit: True

  # - name: Fetch public key
  #   ansible.builtin.fetch:
  #     src: "{{ folder }}{{ pub_key }}"
  #     dest: /tmp/
  #   delegate_to: "{{ scp_server }}"
  #   #run_once: true
  #   vars:
  #     ansible_user: "{{ cvs_username }}"
  #     ansible_password: "{{ cvs_password }}"
