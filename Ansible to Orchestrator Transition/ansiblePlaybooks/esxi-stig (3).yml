---
- name: VMware vSphere 8.0 STIG ESXi Remediation for AAP 2.5
  hosts: localhost
  gather_facts: false
  collections:
    - community.vmware

  vars:
    # Connection parameters
    vcenter_hostname: "{{ vcenter_server | default('') }}"
    vcenter_username: "{{ vcenter_user | default('administrator@vsphere.local') }}"
    vcenter_password: "{{ vcenter_pass | default('') }}"
    
    # Target configuration
    target_hostname: "{{ esxi_hostname | default('') }}"
    target_cluster: "{{ esxi_cluster | default('') }}"
    
    # Infrastructure settings
    syslog_server: "{{ syslog_host | default('') }}"
    ntp_servers: "{{ ntp_server_list | default([]) }}"
    esx_admin_group: "{{ esxi_admin_group | default('root') }}"
    
    # STIG configuration values
    stig_config:
      account_lock_failures: 3
      host_client_timeout: 900
      log_level: "info"
      password_complexity: "similar=deny retry=3 min=disabled,disabled,disabled,disabled,15"
      password_history: 5
      enable_mob: false
      shell_interactive_timeout: 900
      account_unlock_time: 900
      audit_storage_capacity: 100
      shell_timeout: 600
      dcui_timeout: 600
      share_force_salting: 2
      block_guest_bpdu: 1
      suppress_shell_warning: 0
      suppress_hyper_warning: 0
      syslog_cert_check: true
      mem_eager_zero: 1
      api_timeout: 30
      password_max_age: 90
      syslog_audit_enable: true
      syslog_audit_remote: true
      syslog_cert_strict: true
      syslog_log_level: "info"
      syslog_scratch: "[] /scratch/log"
      execute_vibs: "true"
      bmc_network_enable: 0
      lockdown_level: "normal"
    
    # Control enablement (default all to false for safety)
    controls:
      account_lock: "{{ enable_ESXI80000005 | default(false) | bool }}"
      host_timeout: "{{ enable_ESXI80000010 | default(false) | bool }}"
      log_level: "{{ enable_ESXI80000015 | default(false) | bool }}"
      lockdown_mode: "{{ enable_ESXI80000008 | default(true) | bool }}"
      password_complexity: "{{ enable_ESXI80000035 | default(false) | bool }}"
      password_history: "{{ enable_ESXI80000043 | default(false) | bool }}"
      disable_mob: "{{ enable_ESXI80000047 | default(false) | bool }}"
      syslog_config: "{{ enable_ESXI80000114 | default(false) | bool }}"
      ntp_config: "{{ enable_ESXI80000124 | default(false) | bool }}"
      ssh_disable: "{{ enable_ESXI80000193 | default(false) | bool }}"
      shell_disable: "{{ enable_ESXI80000194 | default(false) | bool }}"

  tasks:
    - name: Validate required parameters
      ansible.builtin.assert:
        that:
          - vcenter_hostname | length > 0
          - vcenter_username | length > 0
          - vcenter_password | length > 0
          - (target_hostname | length > 0) or (target_cluster | length > 0)
        fail_msg: "Missing required parameters: vCenter details and target (hostname or cluster)"

    - name: Display job configuration
      ansible.builtin.debug:
        msg:
          - "=== VMware vSphere 8.0 STIG Remediation ==="
          - "vCenter: {{ vcenter_hostname }}"
          - "Target Host: {{ target_hostname | default('N/A') }}"
          - "Target Cluster: {{ target_cluster | default('N/A') }}"
          - "Syslog Server: {{ syslog_server | default('Not configured') }}"
          - "NTP Servers: {{ ntp_servers | join(', ') if ntp_servers | length > 0 else 'Not configured' }}"

    - name: Discover ESXi hosts
      block:
        - name: Parse hostname list
          ansible.builtin.set_fact:
            esxi_hosts: "{{ target_hostname.split(',') | map('trim') | select | list }}"
          when: target_hostname | length > 0

        - name: Get hosts from cluster
          community.vmware.vmware_host_config_info:
            hostname: "{{ vcenter_hostname }}"
            username: "{{ vcenter_username }}"
            password: "{{ vcenter_password }}"
            validate_certs: false
            cluster_name: "{{ target_cluster }}"
          register: cluster_info
          when: 
            - target_cluster | length > 0
            - (esxi_hosts | default([])) | length == 0

        - name: Extract cluster hostnames
          ansible.builtin.set_fact:
            esxi_hosts: "{{ cluster_info.hosts_info.keys() | list }}"
          when:
            - cluster_info is defined
            - cluster_info.hosts_info is defined

        - name: Display discovered hosts
          ansible.builtin.debug:
            msg: "Found {{ esxi_hosts | length }} ESXi host(s): {{ esxi_hosts | join(', ') }}"

    # Security Configuration Tasks
    - name: Configure account lockout policy
      community.vmware.vmware_host_config_manager:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        options:
          Security.AccountLockFailures: "{{ stig_config.account_lock_failures }}"
          Security.AccountUnlockTime: "{{ stig_config.account_unlock_time }}"
      loop: "{{ esxi_hosts }}"
      when: controls.account_lock
      ignore_errors: true
      tags: [security, account_policy]

    - name: Configure session timeouts
      community.vmware.vmware_host_config_manager:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        options:
          UserVars.HostClientSessionTimeout: "{{ stig_config.host_client_timeout }}"
          UserVars.ESXiShellInteractiveTimeOut: "{{ stig_config.shell_interactive_timeout }}"
          UserVars.ESXiShellTimeOut: "{{ stig_config.shell_timeout }}"
          UserVars.DcuiTimeOut: "{{ stig_config.dcui_timeout }}"
          Config.HostAgent.vmacore.soap.sessionTimeout: "{{ stig_config.api_timeout }}"
      loop: "{{ esxi_hosts }}"
      when: controls.host_timeout
      ignore_errors: true
      tags: [security, timeouts]

    - name: Configure password policies
      community.vmware.vmware_host_config_manager:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        options:
          Security.PasswordQualityControl: "{{ stig_config.password_complexity }}"
          Security.PasswordHistory: "{{ stig_config.password_history }}"
          Security.PasswordMaxDays: "{{ stig_config.password_max_age }}"
      loop: "{{ esxi_hosts }}"
      when: controls.password_complexity or controls.password_history
      ignore_errors: true
      tags: [security, password_policy]

    - name: Configure logging settings
      community.vmware.vmware_host_config_manager:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        options:
          Config.HostAgent.log.level: "{{ stig_config.log_level }}"
          Syslog.global.logHost: "{{ syslog_server }}"
          Syslog.global.auditRecord.storageCapacity: "{{ stig_config.audit_storage_capacity }}"
          Syslog.global.auditRecord.storageEnable: "{{ stig_config.syslog_audit_enable }}"
          Syslog.global.auditRecord.remoteEnable: "{{ stig_config.syslog_audit_remote }}"
          Syslog.global.certificate.checkSSLCerts: "{{ stig_config.syslog_cert_check }}"
          Syslog.global.certificate.strictX509Compliance: "{{ stig_config.syslog_cert_strict }}"
          Syslog.global.logLevel: "{{ stig_config.syslog_log_level }}"
          Syslog.global.logDir: "{{ stig_config.syslog_scratch }}"
      loop: "{{ esxi_hosts }}"
      when: controls.log_level or (controls.syslog_config and syslog_server | length > 0)
      ignore_errors: true
      tags: [logging, syslog]

    - name: Disable unnecessary services and features
      community.vmware.vmware_host_config_manager:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        options:
          Config.HostAgent.plugins.solo.enableMob: "{{ stig_config.enable_mob }}"
          UserVars.SuppressShellWarning: "{{ stig_config.suppress_shell_warning }}"
          UserVars.SuppressHyperthreadWarning: "{{ stig_config.suppress_hyper_warning }}"
          VMkernel.Boot.execInstalledOnly: "{{ stig_config.execute_vibs }}"
          Net.BMCNetworkEnable: "{{ stig_config.bmc_network_enable }}"
      loop: "{{ esxi_hosts }}"
      when: controls.disable_mob
      ignore_errors: true
      tags: [security, services]

    - name: Configure memory and network security
      community.vmware.vmware_host_config_manager:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        options:
          Mem.ShareForceSalting: "{{ stig_config.share_force_salting }}"
          Mem.MemEagerZero: "{{ stig_config.mem_eager_zero }}"
          Net.BlockGuestBPDU: "{{ stig_config.block_guest_bpdu }}"
          Config.HostAgent.plugins.hostsvc.esxAdminsGroup: "{{ esx_admin_group }}"
      loop: "{{ esxi_hosts }}"
      ignore_errors: true
      tags: [security, network, memory]

    - name: Configure NTP
      community.vmware.vmware_host_ntp:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        ntp_servers: "{{ ntp_servers }}"
        state: present
      loop: "{{ esxi_hosts }}"
      when: 
        - controls.ntp_config
        - ntp_servers | length > 0
      ignore_errors: true
      tags: [time_sync, ntp]

    - name: Manage SSH service
      community.vmware.vmware_host_service_manager:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        service_name: TSM-SSH
        state: stopped
        service_policy: off
      loop: "{{ esxi_hosts }}"
      when: controls.ssh_disable
      ignore_errors: true
      tags: [services, ssh]

    - name: Manage ESXi Shell service
      community.vmware.vmware_host_service_manager:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        service_name: TSM
        state: stopped
        service_policy: off
      loop: "{{ esxi_hosts }}"
      when: controls.shell_disable
      ignore_errors: true
      tags: [services, shell]

    # Lockdown mode should be applied last
    - name: Enable lockdown mode
      community.vmware.vmware_host_lockdown:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        esxi_hostname: "{{ item }}"
        state: "{{ stig_config.lockdown_level }}"
      loop: "{{ esxi_hosts }}"
      when: controls.lockdown_mode
      ignore_errors: true
      tags: [lockdown_mode, security]

    - name: Generate remediation summary
      ansible.builtin.debug:
        msg:
          - "============================================="
          - "VMware vSphere 8.0 STIG Remediation Complete"
          - "============================================="
          - "Processed {{ esxi_hosts | length }} ESXi host(s)"
          - "Controls applied based on enabled flags"
          - "Review any failures in task output above"
          - "============================================="