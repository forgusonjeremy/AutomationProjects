---
- name: Playbook to stage/scp to N9kv bootflash with network verification
  hosts: "{{ _groups }}"
  gather_facts: False
  
  tasks:
  - name: Validate required variables
    ansible.builtin.assert:
      that:
        - new_image is defined
        - remote_file is defined
        - remote_scp_server is defined
        - cvs_username is defined
        - cvs_password is defined
        - cisco_vrf is defined
        - sha_hash is defined
        - expected_file_size is defined
      fail_msg: "Missing required variables. Please provide: new_image, remote_file, remote_scp_server, cvs_username, cvs_password, cisco_vrf, sha_hash, expected_file_size"

  - name: Display transfer information
    ansible.builtin.debug:
      msg:
        - "=========================================="
        - "Image Transfer Configuration"
        - "=========================================="
        - "Image file: {{ new_image }}"
        - "Expected size: {{ expected_file_size }} bytes ({{ (expected_file_size | int / 1073741824) | round(2) }} GB)"
        - "Source: {{ remote_scp_server }}/{{ remote_file }}"
        - "Destination: bootflash:{{ new_image }}"
        - "VRF: {{ cisco_vrf }}"
        - "=========================================="

  - name: "Set exec-timeout to {{ exec_timeout_transfer }} minutes on VTY lines"
    cisco.nxos.nxos_config:
      parents: "line vty"
      lines:
        - "exec-timeout {{ exec_timeout_transfer }}"

  - name: Enable SCP for N9kv
    ansible.netcommon.cli_config:
      config: "feature scp-server"
      commit: True
    
  - name: Check if image already exists in bootflash
    cisco.nxos.nxos_command:
      commands: 'dir bootflash: | include {{ new_image }}'
    register: check_image

  - name: Display image check result
    ansible.builtin.debug:
      msg: "Image {{ new_image }} {% if new_image in check_image.stdout[0] %}already exists - skipping copy{% else %}not found - will copy{% endif %} in bootflash"

  # Network verification tasks (only if copy is needed)
  - name: Test TCP port 22 (SCP) connectivity
    cisco.ios.ios_command:
      commands:
        - command: "telnet {{ remote_scp_server }} 22 vrf {{ cisco_vrf }}"
          prompt: 
            - 'SSH-'
            - 'Escape character'
            - 'Connection refused'
            - 'Connection timed out'
            - '% Connection'
            - 'Trying'
          answer: "\x1D\nquit\n"
    register: port_test
    ignore_errors: yes
    vars:
      ansible_command_timeout: 30

  - name: Extract port test output
    ansible.builtin.set_fact:
      port_output: "{{ port_test.stdout_lines | flatten | join('\n') }}"

  - name: Display port 22 test results
    ansible.builtin.debug:
      var: port_test.stdout_lines

  - name: Verify port 22 is accessible
    ansible.builtin.fail:
      msg: |
        ==========================================
        ❌ SCP PORT 22 NOT ACCESSIBLE
        ==========================================
        Cannot connect to SCP server: {{ remote_scp_server }}:22
        VRF: {{ cisco_vrf }}
        
        Errors detected:
        {% if port_output is defined and port_output %}
        {% if 'Connection refused' in port_output %}- Connection refused (server not listening on port 22){% endif %}
        {% if 'Unable to connect' in port_output %}- Unable to connect (firewall blocking?){% endif %}
        {% if 'Connection timed out' in port_output or 'timed out' in port_output %}- Connection timed out (firewall blocking?){% endif %}
        {% if '% Connection' in port_output %}- Connection failed{% endif %}
        {% endif %}
        
        Troubleshooting steps:
        1. Verify SSH/SCP service is running on {{ remote_scp_server }}
        2. Check firewall rules allow TCP/22 from VRF {{ cisco_vrf }}
        3. Verify ACLs on network path
        4. Test manually: telnet {{ remote_scp_server }} 22 vrf {{ cisco_vrf }}
        
        ❌ File copy cannot proceed without port 22 access.
        ==========================================
    when: >
      port_output is defined and 
      port_output | length > 0 and (
        ('Connection refused' in port_output) or
        ('Connection timed out' in port_output) or
        ('timed out' in port_output | lower) or
        ('% Connection' in port_output)
      )
      
  - name: Check available bootflash space
    cisco.nxos.nxos_command:
      commands: 'dir bootflash:'
    register: bootflash_space
    when: check_image.stdout[0].find(new_image) == -1

  - name: Display bootflash space
    ansible.builtin.debug:
      msg: "{{ bootflash_space.stdout_lines[0] }}"
    when: check_image.stdout[0].find(new_image) == -1

  - name: Extract available space (in bytes)
    ansible.builtin.set_fact:
      available_space: "{{ bootflash_space.stdout[0] | regex_search('(\\d+) bytes free', '\\1') | first }}"
    when: check_image.stdout[0].find(new_image) == -1

  - name: Calculate required space (file size + 10% buffer)
    ansible.builtin.set_fact:
      required_space: "{{ (expected_file_size | int * 1.1) | int }}"
    when: check_image.stdout[0].find(new_image) == -1

  - name: Verify sufficient bootflash space
    ansible.builtin.fail:
      msg: |
        Insufficient bootflash space!
        Available: {{ available_space }} bytes ({{ (available_space | int / 1073741824) | round(2) }} GB)
        Required: {{ required_space }} bytes ({{ (required_space | int / 1073741824) | round(2) }} GB)
        File size: {{ expected_file_size }} bytes + 10% buffer
    when:
      - check_image.stdout[0].find(new_image) == -1
      - available_space | int < required_space | int

  # BLOCKING SCP COPY
  - name: "SCP image - timeout set to {{scp_timeout_sec}} sec" 
    cisco.nxos.nxos_command:
      commands:
        - command: "copy scp://{{ cvs_username }}@{{ remote_scp_server }}/{{ remote_file }} bootflash:{{ new_image }} vrf {{ cisco_vrf }}"
          prompt:
            - "[P|p]assword:"
            - "continue connecting"
            - "[Y|y]es/[N|n]o"
            - "Are you sure"
            - "Host key"
            - "fingerprint"
            - "Overwrite"
          answer:
            - "{{ cvs_password }}"
            - "yes"
            - "yes"
            - "yes"
            - "yes"
            - "yes"
            - "yes"
    vars:
      ansible_command_timeout: "{{scp_timeout_sec}}"
      ansible_connect_timeout: "{{scp_timeout_sec}}"
    when: new_image not in check_image.stdout[0]
    register: scp_result
    no_log: false
    ignore_errors: yes

  - name: Check if copy completed despite timeout
    ansible.builtin.debug:
      msg: 
        - "SCP task result: {{ 'TIMEOUT' if scp_result.failed else 'SUCCESS' }}"
        - "Note: Copy may have completed on switch even if Ansible timed out"
    when: check_image.stdout[0].find(new_image) == -1

  - name: Reset connection
    ansible.builtin.meta: reset_connection

  # Verification tasks
  - name: Verify file exists in bootflash
    cisco.nxos.nxos_command:
      commands: 'dir bootflash: | include {{ new_image }}'
    register: file_existence
    vars:
      ansible_command_timeout: 300

  - name: DEBUG - Show directory output for file
    ansible.builtin.debug:
      msg: "Directory output: {{ file_existence.stdout[0] }}"

  - name: Extract actual file size (using safe method)
    ansible.builtin.set_fact:
      actual_file_size: "{{ (file_existence.stdout[0] | regex_findall('\\d+'))[0] | default('0') }}"
    when: file_existence.stdout[0] | regex_findall('\\d+') | length > 0

  - name: Set file size to 0 if not found
    ansible.builtin.set_fact:
      actual_file_size: "0"
    when: file_existence.stdout[0] | regex_findall('\\d+') | length == 0

  - name: Display file verification
    ansible.builtin.debug:
      msg: 
        - "=========================================="
        - "File Verification"
        - "=========================================="
        - "File: {{ new_image }}"
        - "Expected size: {{ expected_file_size }} bytes ({{ (expected_file_size | int / 1073741824) | round(2) }} GB)"
        - "Actual size: {{ actual_file_size }} bytes ({{ (actual_file_size | int / 1073741824) | round(2) }} GB)"
        - "Status: {% if actual_file_size | int == expected_file_size | int %}✓ SIZE MATCH{% else %}✗ SIZE MISMATCH{% endif %}"
        - "=========================================="

  - name: Fail if file size doesn't match
    ansible.builtin.fail:
      msg: |
        File size mismatch!
        Expected: {{ expected_file_size }} bytes
        Got: {{ actual_file_size }} bytes
        Difference: {{ (actual_file_size | int - expected_file_size | int) }} bytes
    when: actual_file_size | int != expected_file_size | int

  - name: Verify SHA512 Hash of Image File (may take 5-15+ minutes for {{ (expected_file_size | int / 1073741824) | round(2) }} GB file)
    cisco.nxos.nxos_command:
      commands: 'show file bootflash:{{ new_image }} sha512sum'
    register: sha_hash_verification_results
    vars:
      ansible_command_timeout: 1800  # 30 minutes for hash calculation

  - name: Extract SHA512 hash from output
    ansible.builtin.set_fact:
      actual_sha_hash: "{{ sha_hash_verification_results.stdout[0] | trim }}"

  - name: Display SHA512 hash comparison
    ansible.builtin.debug:
      msg: 
        - "=========================================="
        - "SHA512 Hash Verification"
        - "=========================================="
        - "Expected: {{ sha_hash }}"
        - "Actual:   {{ actual_sha_hash }}"
        - "Status: {% if actual_sha_hash == sha_hash %}✓ HASH MATCH{% else %}✗ HASH MISMATCH{% endif %}"
        - "=========================================="
      
  - name: Fail task if SHA512 Hash Check fails
    ansible.builtin.fail:
      msg: |
        ========================================
        SHA512 Hash Check FAILED!
        ========================================
        Expected: {{ sha_hash }}
        Got:      {{ actual_sha_hash }}
        
        The file may be corrupted. Please:
        1. Delete the file: delete bootflash:{{ new_image }}
        2. Re-run the playbook to copy again
        ========================================
    when: actual_sha_hash != sha_hash

  - name: SUCCESS - Image validated successfully
    ansible.builtin.debug:
      msg:
        - "=========================================="
        - "✓✓✓ SUCCESS ✓✓✓"
        - "=========================================="
        - "✓ Image transfer completed successfully"
        - "✓ File: {{ new_image }}"
        - "✓ Size: {{ actual_file_size }} bytes ({{ (actual_file_size | int / 1073741824) | round(2) }} GB)"
        - "✓ SHA512 hash verified"
        - "✓ Image ready for installation"
        - "=========================================="

  - name: "Restore exec-timeout to 9 minutes on VTY lines"
    cisco.nxos.nxos_config:
      parents: "line vty"
      lines:
        - "exec-timeout 9"

  - name: Disable SCP server (security best practice)
    ansible.netcommon.cli_config:
      config: "no feature scp-server"
      commit: True
