---
# Ansible Automation Platform (AAP) Survey Variables Required:
# - snmp_username: Name of the SNMP user (text)
# - snmp_group: SNMP user group - network-operator or network-admin (choice)
# - snmp_auth_protocol: Authentication protocol - sha, sha-256, or md5 (choice)
# - snmp_auth_password: Authentication password (password)
# - snmp_privacy_protocol: Privacy protocol - aes-128, aes-192, aes-256, or des (choice)
# - snmp_privacy_password: Privacy password (password)
# - snmp_contact: SNMP contact information (text, optional)
# - snmp_location: SNMP location (text, optional)

- name: Configure SNMP User on Cisco Nexus 9K
  hosts: all
  gather_facts: no
  connection: network_cli
  
  tasks:
    - name: Validate required variables
      assert:
        that:
          - snmp_username is defined and snmp_username | length > 0
          - snmp_group is defined
          - snmp_auth_protocol is defined
          - snmp_auth_password is defined and snmp_auth_password | length >= 8
          - snmp_privacy_protocol is defined
          - snmp_privacy_password is defined and snmp_privacy_password | length >= 8
        fail_msg: "Required SNMP variables are missing or invalid"
      no_log: true
      
    - name: Ensure cisco.nxos collection is available
      debug:
        msg: "Using cisco.nxos collection for Nexus switch configuration"

    - name: Configure SNMP user
      cisco.nxos.nxos_config:
        lines:
          - "snmp-server user {{ snmp_username }} {{ snmp_group }} auth {{ snmp_auth_protocol }} {{ snmp_auth_password }} priv {{ snmp_privacy_protocol }} {{ snmp_privacy_password }}"
        save_when: modified
      register: snmp_config_result
      no_log: true

    - name: Display configuration results
      debug:
        var: snmp_config_result
        verbosity: 1

    - name: Verify SNMP user configuration
      cisco.nxos.nxos_command:
        commands:
          - "show snmp user {{ snmp_username }}"
      register: snmp_user_output

    - name: Display SNMP user details
      debug:
        var: snmp_user_output.stdout_lines

    - name: Configure additional SNMP settings
      cisco.nxos.nxos_config:
        lines:
          - "snmp-server contact {{ snmp_contact | default('Network Admin') }}"
          - "snmp-server location {{ snmp_location | default('Data Center') }}"
        save_when: modified
      when: snmp_contact is defined or snmp_location is defined

    - name: Save configuration
      cisco.nxos.nxos_config:
        save_when: always
      tags: save_config