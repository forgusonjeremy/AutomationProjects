---
- name: Change Nexus Switch Admin Password
  hosts: all
  gather_facts: False
  
  tasks:
    - name: Set password variable from hostname and survey inputs
      ansible.builtin.set_fact:
        new_admin_password: "{{ password_prefix }}{{ inventory_hostname.split('.')[0] | lower }}{{ password_suffix }}"
      no_log: true

    - name: Change admin user password
      cisco.nxos.nxos_config:
        lines:
          - "username admin password {{ new_admin_password }} role network-admin"
      no_log: true

    - name: Save configuration
      cisco.nxos.nxos_config:
        save_when: always

    - name: Reset connection to close current session
      ansible.builtin.meta: reset_connection

    - name: Test new password by reconnecting
      cisco.nxos.nxos_command:
        commands:
          - show version | include Software
      vars:
        ansible_password: "{{ new_admin_password }}"
      no_log: true
      register: password_test

    - name: Verify admin user exists
      cisco.nxos.nxos_command:
        commands:
          - show user-account admin
      register: user_check
      
    - name: Display success message
      debug:
        msg: "Admin password successfully changed and verified on {{ inventory_hostname }}{% if var_expose | default('') == 'exposePlease' %} - New password: {{ new_admin_password }}{% endif %}"