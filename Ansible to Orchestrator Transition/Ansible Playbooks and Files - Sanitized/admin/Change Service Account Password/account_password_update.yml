---
- name: Reset AD Account Password
  hosts: all
  gather_facts: no
  collections:
    - microsoft.ad
    - ansible.controller

  vars:
    acc_new_pw: ""
    
    # AAP Controller connection settings
    # controller_host: "https://cvsautomation.washdc.state.sbu"
    
    # Authentication - Use EITHER username/password OR token
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default('', true) }}"
    controller_token: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default('', true) }}"
    
    controller_validate_certs: false

  roles:
    - account

  tasks: