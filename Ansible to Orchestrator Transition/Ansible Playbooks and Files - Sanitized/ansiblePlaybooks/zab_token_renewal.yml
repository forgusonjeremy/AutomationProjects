---
- name: Extend Zabbix User API Token Expiration
  hosts: all
  gather_facts: false
  vars:
    zabbix_url: "https://zbxsrv.pilot.dev/api_jsonrpc.php"
    zabbix_admin_user: "ansiblelocal"
    zabbix_admin_password: ""  # REQUIRED: Set your password here or pass via -e
    target_username: "ansiblelocal"  # Username whose token you want to extend
    token_name: "API-Test"  # Optional: specific token name to update (leave empty to update all tokens)
    validate_certs: false  # Set to true in production with valid certificates
    
    # Expiration options (use ONE of the following):
    # Option 1: Specify time period (easiest)
    expire_in_days: 1      # Set to number of days (e.g., 30, 90, 365)
    expire_in_months: 0     # OR set months (e.g., 1, 3, 6, 12) - overrides days
    expire_in_years: 0      # OR set years (e.g., 1, 2) - overrides months and days
    never_expire: false     # Set to true to never expire (overrides all above)
    
    # Option 2: Specify exact Unix timestamp (advanced users only)
    new_expires_at: 0       # Direct Unix timestamp (0 = use calculated value from above)
    # Examples:
    # - Never expire: 0
    # - 30 days from now: "{{ ansible_date_time.epoch | int + 2592000 }}"
    # - 1 year from now: "{{ ansible_date_time.epoch | int + 31536000 }}"
    # - Specific date: 1735689600 (Unix timestamp)

  tasks:
    - name: Authenticate to Zabbix API and get auth token
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ validate_certs }}"
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_admin_user }}"
            password: "{{ zabbix_admin_password }}"
          id: 1
        status_code: [200, 401, 403]
      register: auth_response
      # no_log: true  # Temporarily disabled for debugging

    - name: Display authentication response for debugging
      debug:
        msg: 
          - "Response status: {{ auth_response.status }}"
          - "Response body: {{ auth_response.json }}"
      when: auth_response.json.result is not defined

    - name: Set auth token variable
      set_fact:
        auth_token: "{{ auth_response.json.result }}"
      no_log: true
      when: auth_response.json.result is defined

    - name: Check authentication error
      fail:
        msg: "Authentication failed: {{ auth_response.json.error | default('Unknown error') }}"
      when: auth_response.json.result is not defined

    - name: Debug authentication response (if error)
      debug:
        var: auth_response.json
      when: auth_response.json.result is not defined

    - name: Get current Unix timestamp
      command: date +%s
      register: current_timestamp
      changed_when: false

    - name: Calculate expiration timestamp based on time period
      set_fact:
        calculated_expires_at: >-
          {%- if never_expire | bool -%}
            0
          {%- elif expire_in_years | int > 0 -%}
            {{ (current_timestamp.stdout | int) + (expire_in_years | int * 31536000) }}
          {%- elif expire_in_months | int > 0 -%}
            {{ (current_timestamp.stdout | int) + (expire_in_months | int * 2592000) }}
          {%- elif expire_in_days | int > 0 -%}
            {{ (current_timestamp.stdout | int) + (expire_in_days | int * 86400) }}
          {%- else -%}
            0
          {%- endif -%}

    - name: Set final expiration timestamp
      set_fact:
        final_expires_at: "{{ new_expires_at if new_expires_at | int > 0 else calculated_expires_at }}"

    - name: Display expiration information
      debug:
        msg:
          - "Expiration Configuration:"
          - "  Never expire: {{ never_expire }}"
          - "  Expire in years: {{ expire_in_years }}"
          - "  Expire in months: {{ expire_in_months }}"
          - "  Expire in days: {{ expire_in_days }}"
          - "  Manual Unix timestamp: {{ new_expires_at }}"
          - "  Final expiration timestamp: {{ final_expires_at }}"
          - "  Final expiration date: {{ 'Never' if final_expires_at | int == 0 else '%Y-%m-%d %H:%M:%S' | strftime(final_expires_at | int) }}"

    - name: Get user ID for target username
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ validate_certs }}"
        body:
          jsonrpc: "2.0"
          method: "user.get"
          params:
            filter:
              username: "{{ target_username }}"
            output:
              - userid
              - username
          auth: "{{ auth_token }}"
          id: 2
        status_code: 200
      register: user_response

    - name: Fail if user not found
      fail:
        msg: "User '{{ target_username }}' not found in Zabbix"
      when: user_response.json.result | length == 0

    - name: Set user ID variable
      set_fact:
        user_id: "{{ user_response.json.result[0].userid }}"

    - name: Get existing API tokens for user
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ validate_certs }}"
        body:
          jsonrpc: "2.0"
          method: "token.get"
          params:
            userids: "{{ user_id }}"
            output: extend
          auth: "{{ auth_token }}"
          id: 3
        status_code: 200
      register: token_list_response

    - name: Fail if no tokens found
      fail:
        msg: "No API tokens found for user '{{ target_username }}'"
      when: token_list_response.json.result | length == 0

    - name: Display existing tokens
      debug:
        msg: "Found {{ token_list_response.json.result | length }} token(s) for user {{ target_username }}"

    - name: Filter tokens by name (if specified)
      set_fact:
        tokens_to_update: "{{ token_list_response.json.result | selectattr('name', 'equalto', token_name) | list }}"
      when: token_name != ""

    - name: Use all tokens if no name specified
      set_fact:
        tokens_to_update: "{{ token_list_response.json.result }}"
      when: token_name == ""

    - name: Fail if specific token name not found
      fail:
        msg: "Token with name '{{ token_name }}' not found for user '{{ target_username }}'"
      when: token_name != "" and tokens_to_update | length == 0

    - name: Update token expiration date
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ validate_certs }}"
        body:
          jsonrpc: "2.0"
          method: "token.update"
          params:
            tokenid: "{{ item.tokenid }}"
            expires_at: "{{ final_expires_at }}"
          auth: "{{ auth_token }}"
          id: "{{ 4 + idx }}"
        status_code: 200
      loop: "{{ tokens_to_update }}"
      loop_control:
        index_var: idx
      register: update_response

    - name: Display updated token information
      debug:
        msg:
          - "Token(s) updated successfully!"
          - "Username: {{ target_username }}"
          - "Number of tokens updated: {{ tokens_to_update | length }}"
          - "New expiration: {{ 'Never' if final_expires_at | int == 0 else '%Y-%m-%d %H:%M:%S' | strftime(final_expires_at | int) }}"
          - "Updated tokens:"
          - "{{ tokens_to_update | map(attribute='name') | list }}"

    - name: Show detailed token information
      debug:
        msg:
          - "Token Name: {{ item.name }}"
          - "Token ID: {{ item.tokenid }}"
          - "Status: {{ 'Active' if item.status == '0' else 'Disabled' }}"
          - "Old Expiration: {{ 'Never' if item.expires_at == '0' else '%Y-%m-%d %H:%M:%S' | strftime(item.expires_at | int) }}"
          - "New Expiration: {{ 'Never' if final_expires_at | int == 0 else '%Y-%m-%d %H:%M:%S' | strftime(final_expires_at | int) }}"
      loop: "{{ tokens_to_update }}"

    - name: Logout from Zabbix API
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ validate_certs }}"
        body:
          jsonrpc: "2.0"
          method: "user.logout"
          params: []
          auth: "{{ auth_token }}"
          id: 99
        status_code: 200
      ignore_errors: true