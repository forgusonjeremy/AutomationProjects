---
# PowerFlex Manager Credential Update for AAP 2.6
# This playbook uses AAP survey to collect inputs
# No interactive prompts - all variables come from survey

- name: Update PowerFlex Manager Credentials
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    # Variables populated by AAP survey:
    # - pfm_host
    # - pfm_username
    # - pfm_password
    # - new_password
    # - credential_filter_include (default: "ow,ew,26")
    # - credential_filter_exclude (default: "Power,vcs")
    # - credential_type_filter (optional: "OS ADMIN,Node" or empty for all)
    # - dry_run (default: false)

    include_patterns: "{{ credential_filter_include.split(',') | map('trim') | map('regex_replace', '^(.*)$', '*\\1*') | list }}"
    exclude_patterns: "{{ credential_filter_exclude.split(',') | map('trim') | map('regex_replace', '^(.*)$', '*\\1*') | list }}"
    type_filters: "{{ credential_type_filter.split(',') | map('trim') | list if credential_type_filter is defined and credential_type_filter | length > 0 else [] }}"

  tasks:
    - name: Display execution parameters
      ansible.builtin.debug:
        msg: |
          ========================================
          PowerFlex Credential Update
          ========================================
          Host: {{ pfm_host }}
          User: {{ pfm_username }}
          Mode: {{ 'DRY RUN (Preview Only)' if dry_run | bool else 'LIVE UPDATE' }}
          Include: {{ credential_filter_include }}
          Exclude: {{ credential_filter_exclude }}
          Type Filter: {{ credential_type_filter if credential_type_filter is defined and credential_type_filter | length > 0 else 'All Types' }}
          ========================================

    - name: Authenticate to PowerFlex Manager
      ansible.builtin.uri:
        url: "https://{{ pfm_host }}/rest/auth/login"
        method: POST
        body_format: json
        body:
          username: "{{ pfm_username }}"
          password: "{{ pfm_password }}"
        validate_certs: false
        timeout: 30
        status_code: [200, 201]
        return_content: true
      register: auth_response
      ignore_errors: true

    - name: Display authentication error if failed
      ansible.builtin.debug:
        msg: |
          Authentication FAILED!
          URL: https://{{ pfm_host }}/rest/auth/login
          Status: {{ auth_response.status | default('N/A') }}
          Message: {{ auth_response.msg | default('No error message') }}
          Response: {{ auth_response.json | default('No response') }}
      when: auth_response.failed | default(false)

    - name: Fail if authentication did not succeed
      ansible.builtin.fail:
        msg: |
          Authentication failed. Check:
          1. PowerFlex Manager is reachable at {{ pfm_host }}
          2. Username and password are correct
          3. Network connectivity from AAP to PowerFlex Manager
      when: auth_response.failed | default(false) or auth_response.json.access_token is not defined

    - name: Set auth token fact
      ansible.builtin.set_fact:
        auth_token: "{{ auth_response.json.access_token }}"
      when: 
        - not (auth_response.failed | default(false))
        - auth_response.json.access_token is defined
      no_log: true

    - name: Display authentication success
      ansible.builtin.debug:
        msg: "✓ Authentication successful"
      when: auth_token is defined

    - name: Fetch all credentials
      ansible.builtin.uri:
        url: "https://{{ pfm_host }}/Api/V1/Credential"
        method: GET
        validate_certs: false
        timeout: 30
        status_code: 200
        headers:
          Accept: "application/json"
          Content-Type: "application/json"
          Authorization: "Bearer {{ auth_token }}"
      register: credentials_response
      when: auth_token is defined
      no_log: true

    - name: Filter credentials by name patterns
      ansible.builtin.set_fact:
        name_filtered_credentials: >-
          {{
            credentials_response.json.credentialList
            | selectattr('link.title', 'defined')
            | selectattr('link.title', 'search', 'ow|ew|26')
            | rejectattr('link.title', 'search', 'Power|vcs')
            | list
          }}
      when: 
        - credentials_response is defined
        - credentials_response.json is defined
        - credentials_response.json.credentialList is defined
      no_log: true

    - name: Filter credentials by type (if specified)
      ansible.builtin.set_fact:
        filtered_credentials: >-
          {{
            name_filtered_credentials
            | selectattr('credential.type', 'in', type_filters)
            | list
            if type_filters | length > 0
            else name_filtered_credentials
          }}
      when: name_filtered_credentials is defined
      no_log: true

    - name: Display credentials to update
      ansible.builtin.debug:
        msg: |
          ========================================
          Found {{ filtered_credentials | length }} credentials to update:
          {% for item in filtered_credentials | sort(attribute='link.title') %}
          {{ loop.index }}. {{ item.link.title }}
             - Type: {{ item.credential.type }}
             - User: {{ item.credential.username }}
             - ID: {{ item.credential.id }}
          {% endfor %}
          ========================================
      when: filtered_credentials is defined

    - name: DRY RUN - No updates performed
      ansible.builtin.debug:
        msg: "DRY RUN MODE - Credentials displayed above will NOT be updated"
      when: dry_run | bool

