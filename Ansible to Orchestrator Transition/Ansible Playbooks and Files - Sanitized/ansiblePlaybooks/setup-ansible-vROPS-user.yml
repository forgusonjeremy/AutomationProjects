# setup-ansible-user.yml
---
- name: Create Ansible service account with SSH key access
  hosts: all
  become: yes
  vars:
    ansible_service_user: "{{var_new_user | default('ansible-user')}}"
    ansible_service_group: "{{var_new_user | default('ansible-user')}}"
    ansible_public_key_content: "{{var_pub_key | default('')}}"
    # Set to false if you don't want passwordless sudo
    enable_passwordless_sudo: true
    
  tasks:
    - name: Debug variables
      debug:
        msg: |
          Variables received:
          - var_new_user: {{ var_new_user | default('NOT SET') }}
          - ansible_service_user: {{ ansible_service_user }}
          - ansible_service_group: {{ ansible_service_group }}
          - var_pub_key: {{ 'SET (' + (var_pub_key | default('') | length | string) + ' characters)' if var_pub_key is defined and var_pub_key != '' else 'NOT SET' }}
          - enable_passwordless_sudo: {{ enable_passwordless_sudo }}

    - name: Validate required variables
      fail:
        msg: "Required variable '{{ item }}' is not defined or empty"
      when: vars[item] is not defined or vars[item] == ""
      loop:
        - var_new_user
        - var_pub_key

    - name: Check if user account already exists
      getent:
        database: passwd
        key: "{{ ansible_service_user }}"
      register: user_exists
      failed_when: false

    - name: Display account status
      debug:
        msg: |
          Account Status Check:
          {% if user_exists.ansible_facts is defined and user_exists.ansible_facts.getent_passwd %}
          ⚠️  User '{{ ansible_service_user }}' already exists
          - Current home: {{ user_exists.ansible_facts.getent_passwd[ansible_service_user][4] }}
          - Current shell: {{ user_exists.ansible_facts.getent_passwd[ansible_service_user][5] }}
          - Action: Will update existing account configuration
          {% else %}
          ✨ User '{{ ansible_service_user }}' does not exist
          - Action: Will create new account
          {% endif %}

    - name: Check if SSH authorized_keys already exists
      stat:
        path: "/home/{{ ansible_service_user }}/.ssh/authorized_keys"
      register: authorized_keys_exists
      when: user_exists.ansible_facts is defined and user_exists.ansible_facts.getent_passwd

    - name: Display SSH key status for existing user
      debug:
        msg: |
          SSH Key Status:
          {% if authorized_keys_exists.stat is defined and authorized_keys_exists.stat.exists %}
          📝 SSH authorized_keys file exists ({{ authorized_keys_exists.stat.size }} bytes)
          - Action: Will add/update SSH key (non-exclusive)
          {% else %}
          📝 No SSH authorized_keys file found
          - Action: Will create SSH key configuration
          {% endif %}
      when: user_exists.ansible_facts is defined and user_exists.ansible_facts.getent_passwd
    - name: Create ansible service group
      group:
        name: "{{ ansible_service_group }}"
        state: present

    - name: Create ansible service user
      user:
        name: "{{ ansible_service_user }}"
        group: "{{ ansible_service_group }}"
        groups: wheel
        append: yes
        shell: /bin/bash
        home: "/home/{{ ansible_service_user }}"
        create_home: yes
        state: present

    - name: Ensure .ssh directory exists for ansible user
      file:
        path: "/home/{{ ansible_service_user }}/.ssh"
        state: directory
        owner: "{{ ansible_service_user }}"
        group: "{{ ansible_service_group }}"
        mode: '0700'

    - name: Validate SSH public key content is provided
      fail:
        msg: "ansible_public_key_content variable must be set with your SSH public key"
      when: ansible_public_key_content == "" or ansible_public_key_content is not defined

    - name: Add SSH public key to authorized_keys
      authorized_key:
        user: "{{ ansible_service_user }}"
        key: "{{ ansible_public_key_content }}"
        state: present
        exclusive: no

    - name: Configure passwordless sudo for ansible user
      lineinfile:
        path: /etc/sudoers.d/{{ ansible_service_user }}
        line: "{{ ansible_service_user }} ALL=(ALL) NOPASSWD:ALL"
        state: present
        mode: '0440'
        create: yes
        validate: 'visudo -cf %s'
      when: enable_passwordless_sudo

    - name: Ensure SSH service is running and enabled
      service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: started
        enabled: yes

    - name: Display setup completion message
      debug:
        msg: |
          ✅ Ansible service account setup completed successfully!
          
          Account details:
          - Username: {{ ansible_service_user }}
          - Home: /home/{{ ansible_service_user }}
          - Sudo access: {{ 'Enabled (passwordless)' if enable_passwordless_sudo else 'Disabled' }}
          - SSH key authentication: Configured with provided public key
          
          Next steps:
          1. Create AAP Machine Credential with username: {{ ansible_service_user }}
          2. Use your private key in the credential
          3. Test connection: ansible -m ping target_hosts
          
          You can now use this account for Ansible automation!