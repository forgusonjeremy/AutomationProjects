---
- name: Microsoft Defender for Endpoint Health Check
  hosts: all
  become: yes
  gather_facts: no
  
  vars:
    expected_org_id: "1a209049-7b0c-4ce8-be4c-93559668b858"
    expected_healthy: "true"
    expected_real_time_protection: "true"
    
  tasks:

    - name: Check mdatp org_id
      command: mdatp health --field org_id
      register: org_id_result
      changed_when: false

    - name: Check mdatp healthy status
      command: mdatp health --field healthy
      register: healthy_result
      changed_when: false

    - name: Check mdatp real-time protection status
      command: mdatp health --field real_time_protection_enabled
      register: rtp_result
      changed_when: false

    - name: Run mdatp connectivity test
      command: mdatp connectivity test
      register: connectivity_result
      changed_when: false

    - name: Display results
      debug:
        msg:
          - "Org ID: {{ org_id_result.stdout | trim }}"
          - "Healthy: {{ healthy_result.stdout | trim }}"
          - "Real-time Protection: {{ rtp_result.stdout | trim }}"
          - "Connectivity Test: {{ 'PASSED' if '[OK]' in connectivity_result.stdout else 'FAILED' }}"

    - name: Validate org_id matches expected value
      assert:
        that:
          - org_id_result.stdout | trim | replace('"', '') == expected_org_id
        fail_msg: "Org ID mismatch. Expected: {{ expected_org_id }}, Got: {{ org_id_result.stdout | trim }}"
        success_msg: "Org ID validation passed"

    - name: Validate healthy status
      assert:
        that:
          - healthy_result.stdout | trim == expected_healthy
        fail_msg: "Health status mismatch. Expected: {{ expected_healthy }}, Got: {{ healthy_result.stdout | trim }}"
        success_msg: "Health status validation passed"

    - name: Validate real-time protection status
      assert:
        that:
          - rtp_result.stdout | trim == expected_real_time_protection
        fail_msg: "Real-time protection status mismatch. Expected: {{ expected_real_time_protection }}, Got: {{ rtp_result.stdout | trim }}"
        success_msg: "Real-time protection status validation passed"

    - name: Validate connectivity test passed
      assert:
        that:
          - connectivity_result.rc == 0
          - "'[OK]' in connectivity_result.stdout"
        fail_msg: "Connectivity test failed"
        success_msg: "Connectivity test validation passed"

    - name: Count successful connectivity tests
      set_fact:
        ok_count: "{{ connectivity_result.stdout | regex_findall('\\[OK\\]') | length }}"

    - name: Display connectivity test summary
      debug:
        msg: "Connectivity test completed: {{ ok_count }} endpoints tested successfully"

    - name: Validate minimum connectivity tests passed
      assert:
        that:
          - ok_count | int >= 10
        fail_msg: "Insufficient connectivity tests passed. Expected at least 10, got {{ ok_count }}"
        success_msg: "All required connectivity tests passed ({{ ok_count }} endpoints)"

    - name: Final summary
      debug:
        msg:
          - "=== MDE Health Check Summary ==="
          - "✓ Org ID: {{ org_id_result.stdout | trim }}"
          - "✓ Healthy: {{ healthy_result.stdout | trim }}"
          - "✓ Real-time Protection: {{ rtp_result.stdout | trim }}"
          - "✓ Connectivity: {{ ok_count }} endpoints OK"
          - "=== All validations passed ==="