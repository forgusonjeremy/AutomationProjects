---
- name: Install Microsoft Defender for Endpoint on RHEL
  hosts: all
  become: yes
  gather_facts: no
  
  vars:
    # Define the working directory where MDE files will be copied
    mde_install_dir: "/tmp/mde"
    # Define the local directory where MDE files are stored on Ansible control node
    local_mde_files_dir: "files/mde_gcc"
    # MDE script filenames
    mdeInstallerscript: "mde_gcc_install.sh"
    MSDefenderATPOnboarding: "MicrosoftDefenderATPOnboardingLinuxServer.py"
    
  tasks:
    - name: Install yum-utils package
      yum:
        name: yum-utils
        state: present
      register: yum_utils_install
      
    - name: Display yum-utils installation result
      debug:
        msg: "yum-utils installation {{ 'succeeded' if yum_utils_install.changed else 'was already present' }}"

    - name: Check if fapolicyd service exists
      systemd:
        name: fapolicyd
      register: fapolicyd_service_check
      failed_when: false
      changed_when: false

    - name: Stop fapolicyd service before MDE installation
      systemd:
        name: fapolicyd
        state: stopped
      register: fapolicyd_stop_result
      when: fapolicyd_service_check.status is defined and fapolicyd_service_check.status.LoadState == "loaded"
      
    - name: Display fapolicyd stop result
      debug:
        msg: "fapolicyd service {{ 'stopped' if fapolicyd_stop_result.changed else 'was already stopped' }}"
      when: fapolicyd_service_check.status is defined and fapolicyd_service_check.status.LoadState == "loaded"
      
    - name: Display fapolicyd service not found message
      debug:
        msg: "fapolicyd service not found on system, skipping stop operation"
      when: fapolicyd_service_check.status is not defined or fapolicyd_service_check.status.LoadState != "loaded"
    
    - name: Create MDE installation directory on target
      file:
        path: "{{ mde_install_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
        
    - name: Copy MDE installer script to target
      copy:
        src: "{{ local_mde_files_dir }}/{{ mdeInstallerscript }}"
        dest: "{{ mde_install_dir }}/{{ mdeInstallerscript }}"
        owner: root
        group: root
        mode: '0755'
      register: installer_copy
      
    - name: Copy MDE onboarding script to target
      copy:
        src: "{{ local_mde_files_dir }}/{{ MSDefenderATPOnboarding }}"
        dest: "{{ mde_install_dir }}/{{ MSDefenderATPOnboarding }}"
        owner: root
        group: root
        mode: '0755'
      register: onboarding_copy
      
    - name: Display file copy results
      debug:
        msg: "MDE files copied to target system successfully"
      when: installer_copy.changed or onboarding_copy.changed
    
    - name: Verify MDE files were copied successfully
      stat:
        path: "{{ item }}"
      register: mde_files_check
      loop:
        - "{{ mde_install_dir }}/{{ MSDefenderATPOnboarding }}"
      
    - name: Fail if MDE files are missing after copy
      fail:
        msg: "MDE file {{ item.item }} was not copied successfully"
      when: not item.stat.exists
      loop: "{{ mde_files_check.results }}"
    
    - name: Verify Python3 is available
      command: /usr/bin/python3 --version
      register: python3_check
      changed_when: false
      failed_when: python3_check.rc != 0
      
    - name: Execute MDE onboarding script
      command: /usr/bin/python3 {{ MSDefenderATPOnboarding }}
      args:
        chdir: "{{ mde_install_dir }}"
      register: mde_onboarding_result
      become: yes
      
    - name: Display MDE onboarding result
      debug:
        var: mde_onboarding_result.stdout_lines
      when: mde_onboarding_result.stdout_lines is defined
      
    - name: Display MDE onboarding errors if any
      debug:
        var: mde_onboarding_result.stderr_lines
      when: mde_onboarding_result.stderr_lines is defined and mde_onboarding_result.stderr_lines | length > 0
      
    - name: Verify MDE onboarding completed successfully
      fail:
        msg: "MDE onboarding script failed with return code {{ mde_onboarding_result.rc }}"
      when: mde_onboarding_result.rc != 0
      
    # - name: Check if mdatp_onboard.json exists
    #   stat:
    #     path: "/etc/opt/microsoft/mdatp/mdatp_onboard.json"
    #   register: onboard_json_check
      
    # - name: Copy mdatp_onboard.json to working directory
    #   copy:
    #     src: "/etc/opt/microsoft/mdatp/mdatp_onboard.json"
    #     dest: "{{ mde_install_dir }}/mdatp_onboard.json"
    #     remote_src: yes
    #     owner: root
    #     group: root
    #     mode: '0644'
    #   when: onboard_json_check.stat.exists
    #   register: json_copy_result
      
    # - name: Display warning if mdatp_onboard.json not found
    #   debug:
    #     msg: "Warning: mdatp_onboard.json not found at /etc/opt/microsoft/mdatp/mdatp_onboard.json"
    #   when: not onboard_json_check.stat.exists
      
    # - name: Execute MDE installer script with flags
    #   command: ./{{ mdeInstallerscript }} -i -m -y
    #   args:
    #     chdir: "{{ mde_install_dir }}"
    #   register: mde_installer_result
    #   become: yes
      
    # - name: Display MDE installer result
    #   debug:
    #     var: mde_installer_result.stdout_lines
    #   when: mde_installer_result.stdout_lines is defined
      
    # - name: Display MDE installer errors if any
    #   debug:
    #     var: mde_installer_result.stderr_lines
    #   when: mde_installer_result.stderr_lines is defined and mde_installer_result.stderr_lines | length > 0
      
    # - name: Verify MDE installer completed successfully
    #   fail:
    #     msg: "MDE installer script failed with return code {{ mde_installer_result.rc }}"
    #   when: mde_installer_result.rc != 0

    - name: restart mdatp service
      systemd:
        name: mdatp
        state: restarted
        enabled: yes

    - name: Display installation completion message
      debug:
        msg: "Microsoft Defender for Endpoint installation completed successfully"

    - name: Start fapolicyd service after MDE installation
      systemd:
        name: fapolicyd
        state: started
      register: fapolicyd_start_result
      when: fapolicyd_service_check.status is defined and fapolicyd_service_check.status.LoadState == "loaded"
      
    - name: Display fapolicyd start result
      debug:
        msg: "fapolicyd service {{ 'started' if fapolicyd_start_result.changed else 'was already running' }}"
      when: fapolicyd_service_check.status is defined and fapolicyd_service_check.status.LoadState == "loaded"

  handlers:
    - name: restart mdatp service
      systemd:
        name: mdatp
        state: restarted
        enabled: yes
      when: ansible_service_mgr == "systemd"