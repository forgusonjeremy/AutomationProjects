schema:
  project:
    label: Project
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: projects
      type: scriptAction
    constraints:
      required: true
  deploymentName:
    label: Deployment Name
    type:
      dataType: string
      isMultiple: false
    default:
      bind: vmHostname
    constraints:
      required: true
      max-value: 900
  vmHostname:
    label: VM Hostname
    description: >-
      VM display name and guest hostname. Alphanumeric and hyphens only. Max 15
      chars (Windows NetBIOS).
    signpost: >-
      VM display name and guest hostname. Alphanumeric and hyphens only. Max 15
      chars (Windows NetBIOS).
    type:
      dataType: string
      isMultiple: false
    constraints:
      required: true
      min-value: 1
      max-value: 15
      pattern:
        value: ^[a-zA-Z0-9\-]+$
        message: >-
          Constraint Description: must be compliant with ^[a-zA-Z0-9\-]+$
          regular expression.
  vcenterName:
    label: vCenter to which to deploy the VM
    description: Name of the vCenter server where the VM will be deployed
    signpost: Name of the vCenter server where the VM will be deployed
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getVCenterList
      type: scriptAction
      parameters: []
    constraints:
      required: true
  clusterName:
    label: vSphere Cluster Name
    description: Name of the vSphere cluster where the VM is to be created.
    signpost: Name of the vSphere cluster where the VM is to be created.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getClusterList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
    constraints:
      required: true
  networkName:
    label: Network Name
    description: Name of the dvPortgroup to which the VM is to be connected.
    signpost: Name of the dvPortgroup to which the VM is to be connected.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getNetworkList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
        - $type:
            dataType: string
            isMultiple: false
          clusterName: clusterName
    constraints:
      required: true
  folderName:
    label: VM Folder Name
    description: Name of the VM folder where the VM is to be placed.
    signpost: Name of the VM folder where the VM is to be placed.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getFolderList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
    constraints:
      required: true
  cpuCount:
    label: CPU Count
    type:
      dataType: integer
      isMultiple: false
    default: 2
    constraints:
      min-value: 1
      max-value: 64
  memoryGB:
    label: Memory (GB)
    type:
      dataType: integer
      isMultiple: false
    default: 4
    constraints:
      min-value: 1
      max-value: 512
  adminAcctConfigElemName:
    label: Local Admin Configuration Element Name
    description: >-
      Name of the configuration element in Orchestrator containing the
      administrator account information used in updating the local admin account
      username and password
    signpost: >-
      Name of the configuration element in Orchestrator containing the
      administrator account information used in updating the local admin account
      username and password
    type:
      dataType: string
      isMultiple: false
    default: Windows Guest Admin Account Info
    constraints:
      required: true
  defaultAdminNameAttrName:
    label: Default Admin Name Attribute Name
    description: >-
      Name of configuration element attribute containing the default
      administrator account name
    signpost: >-
      Name of configuration element attribute containing the default
      administrator account name
    type:
      dataType: string
      isMultiple: false
    default: defaultAdminName
    constraints:
      required: true
  defaultAdminPasswordAttrName:
    label: Default Admin Password Attribute Name
    description: >-
      Name of the configuration element attribute containing the default
      administrator account password
    signpost: >-
      Name of the configuration element attribute containing the default
      administrator account password
    type:
      dataType: string
      isMultiple: false
    default: defaultAdminPassword
    constraints:
      required: true
  defaultAdminNewNameAttrName:
    label: New Default Admin Name Attribute Name
    description: >-
      Name of the configuration element attribute containing the new default
      admin name
    signpost: >-
      Name of the configuration element attribute containing the new default
      admin name
    type:
      dataType: string
      isMultiple: false
    default: newDefaultAdminName
    constraints:
      required: true
  defaultAdminNewPasswordAttrName:
    label: New Default Admin Password Attribute Name
    description: >-
      Name of the configuration element attribute containing the new password
      for the default admin account
    signpost: >-
      Name of the configuration element attribute containing the new password
      for the default admin account
    type:
      dataType: string
      isMultiple: false
    default: newDefaultAdminPassword
    constraints:
      required: true
options:
  externalValidations: []
