schema:
  project:
    label: Project
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: projects
      type: scriptAction
    constraints:
      required: true
  deploymentName:
    label: Deployment Name
    type:
      dataType: string
      isMultiple: false
    default:
      bind: vmHostname
    constraints:
      required: true
      max-value: 900
  vmHostname:
    label: VM Hostname
    description: >-
      VM display name and guest hostname. Alphanumeric and hyphens only. Max 15
      chars (Windows NetBIOS).
    signpost: >-
      VM display name and guest hostname. Alphanumeric and hyphens only. Max 15
      chars (Windows NetBIOS).
    type:
      dataType: string
      isMultiple: false
    constraints:
      required: true
      min-value: 1
      max-value: 15
      pattern:
        value: ^[a-zA-Z0-9\-]+$
        message: >-
          Constraint Description: must be compliant with ^[a-zA-Z0-9\-]+$
          regular expression.
  vcenterName:
    label: vCenter to which to deploy the VM
    description: Name of the vCenter server where the VM will be deployed
    signpost: Name of the vCenter server where the VM will be deployed
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getVCenterList
      type: scriptAction
      parameters: []
    constraints:
      required: true
  clusterName:
    label: vSphere Cluster Name
    description: Name of the vSphere cluster where the VM is to be created.
    signpost: Name of the vSphere cluster where the VM is to be created.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getClusterList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
    constraints:
      required: true
  networkName:
    label: Network Name
    description: Name of the dvPortgroup to which the VM is to be connected.
    signpost: Name of the dvPortgroup to which the VM is to be connected.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getNetworkList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
        - $type:
            dataType: string
            isMultiple: false
          clusterName: clusterName
    constraints:
      required: true
  folderName:
    label: VM Folder Name
    description: Name of the VM folder where the VM is to be placed.
    signpost: Name of the VM folder where the VM is to be placed.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getFolderList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
    constraints:
      required: true
  cpuCount:
    label: vCPU Count
    type:
      dataType: integer
      isMultiple: false
    default: 2
    constraints:
      min-value: 1
      max-value: 64
  memoryGB:
    label: Memory (GB)
    type:
      dataType: integer
      isMultiple: false
    default: 4
    constraints:
      min-value: 1
      max-value: 512
  joinDomain:
    label: Join Active Directory
    type:
      dataType: boolean
      isMultiple: false
    default: true
  ouName:
    label: Target OU
    description: AD OU (under the project's base OU) where the computer object will be created.
    signpost: AD OU under the project's base OU.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getProjectADChildOUs
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcfaBaseUrl: vcfaBaseUrl
        - $type:
            dataType: string
            isMultiple: false
          orgName: orgName
        - $type:
            dataType: string
            isMultiple: false
          configElementName: configElementName
        - $type:
            dataType: string
            isMultiple: false
          configElementAttribute: configElementAttribute
        - $type:
            dataType: string
            isMultiple: false
          projectId: project
        - $type:
            dataType: string
            isMultiple: false
          apiVersion: apiVersion
    constraints:
      required: true
  vcfaBaseUrl:
    label: VCF Automation Base URL
    type:
      dataType: string
      isMultiple: false
    default: https://vcfa.site-a.vcf.lab
    constraints:
      required: true
  orgName:
    label: VCF Automation Org Name
    type:
      dataType: string
      isMultiple: false
    default: <your-vm-apps-org-name>
    constraints:
      required: true
  configElementName:
    label: Refresh Token Config Element Name
    type:
      dataType: string
      isMultiple: false
    default: VCFA-Credentials
    constraints:
      required: true
  configElementAttribute:
    label: Refresh Token Attribute Key
    type:
      dataType: string
      isMultiple: false
    default: refreshToken
    constraints:
      required: true
  apiVersion:
    label: IaaS API Version
    type:
      dataType: string
      isMultiple: false
    default: '2021-07-15'
    constraints:
      required: true
options:
  externalValidations: []
