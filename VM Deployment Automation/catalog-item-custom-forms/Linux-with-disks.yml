layout:
  pages:
    - id: page_general
      sections:
        - id: section_project
          fields:
            - id: project
              display: combobox
              signpostPosition: right-middle
        - id: section_deploymentName
          fields:
            - id: deploymentName
              display: textField
              state:
                visible: false
                read-only: false
              signpostPosition: right-middle
        - id: section_vmHostname
          fields:
            - id: vmHostname
              display: textField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_vcenterName
          fields:
            - id: vcenterName
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_clusterName
          fields:
            - id: clusterName
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_networkName
          fields:
            - id: networkName
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_folderName
          fields:
            - id: folderName
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_cpuCount
          fields:
            - id: cpuCount
              display: integerField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_memoryGB
          fields:
            - id: memoryGB
              display: integerField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_osVersion
          fields:
            - id: osVersion
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_99ceb9b3
          fields:
            - id: isoPath
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_21296889
          fields:
            - id: dataDisks
              display: datagrid
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
      title: General
schema:
  project:
    label: Project
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: projects
      type: scriptAction
    constraints:
      required: true
  deploymentName:
    label: Deployment Name
    type:
      dataType: string
      isMultiple: false
    default:
      bind: vmHostname
    constraints:
      required: true
      max-value: 900
  vmHostname:
    label: VM Hostname
    description: >-
      VM display name and guest hostname. Alphanumeric and hyphens only. Max 15
      chars (Windows NetBIOS).
    signpost: >-
      VM display name and guest hostname. Alphanumeric and hyphens only. Max 15
      chars (Windows NetBIOS).
    type:
      dataType: string
      isMultiple: false
    constraints:
      required: true
      min-value: 1
      max-value: 15
      pattern:
        value: ^[a-zA-Z0-9\-]+$
        message: >-
          Constraint Description: must be compliant with ^[a-zA-Z0-9\-]+$
          regular expression.
  vcenterName:
    label: vCenter to which to deploy the VM
    description: Name of the vCenter server where the VM will be deployed
    signpost: Name of the vCenter server where the VM will be deployed
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getVCenterList
      type: scriptAction
      parameters: []
    constraints:
      required: true
  clusterName:
    label: vSphere Cluster Name
    description: Name of the vSphere cluster where the VM is to be created.
    signpost: Name of the vSphere cluster where the VM is to be created.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getClusterList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
    constraints:
      required: true
  networkName:
    label: Network Name
    description: Name of the dvPortgroup to which the VM is to be connected.
    signpost: Name of the dvPortgroup to which the VM is to be connected.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getNetworkList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
        - $type:
            dataType: string
            isMultiple: false
          clusterName: clusterName
    constraints:
      required: true
  folderName:
    label: VM Folder Name
    description: Name of the VM folder where the VM is to be placed.
    signpost: Name of the VM folder where the VM is to be placed.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getFolderList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
    constraints:
      required: true
  cpuCount:
    label: CPU Count
    type:
      dataType: integer
      isMultiple: false
    default: 2
    constraints:
      min-value: 1
      max-value: 64
  memoryGB:
    label: Memory (GB)
    type:
      dataType: integer
      isMultiple: false
    default: 4
    constraints:
      min-value: 1
      max-value: 512
  osVersion:
    label: OS Version
    description: Linux OS version / image to deploy
    signpost: Linux OS version / image to deploy
    type:
      dataType: string
      isMultiple: false
    valueList:
      - value: centos
        label: centos
      - value: ubuntu
        label: ubuntu
    constraints:
      required: true
  isoPath:
    label: ISO Image
    description: ISO to attach and boot from.
    signpost: ISO to attach and boot from.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getIsoList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
        - $type:
            dataType: string
            isMultiple: false
          clusterName: clusterName
    constraints:
      required: true
  dataDisks:
    label: Additional Data Disks
    description: One entry per additional disk. Choose a size and a SCSI controller.
    signpost: One entry per additional disk. Choose a size and a SCSI controller.
    type:
      dataType: complex
      fields:
        - label: Size (GB)
          type:
            dataType: integer
            isMultiple: false
          constraints:
            min-value: 1
          id: sizeGb
        - label: SCSI Controller
          type:
            dataType: string
            isMultiple: false
          default: SCSI_Controller_1
          valueList:
            - value: SCSI_Controller_1
              label: SCSI_Controller_1
            - value: SCSI_Controller_2
              label: SCSI_Controller_2
            - value: SCSI_Controller_3
              label: SCSI_Controller_3
          id: SCSIController
        - label: provisionType
          type:
            dataType: string
            isMultiple: false
          valueList:
            - value: thin
              label: thin
            - value: thick
              label: thick
            - value: eagerZeroedThick
              label: eagerZeroedThick
          id: provisionType
      isMultiple: true
    constraints:
      required: true
      min-value: 1
      max-value: 10
options:
  externalValidations: []
