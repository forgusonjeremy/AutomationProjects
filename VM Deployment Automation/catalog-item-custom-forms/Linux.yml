layout:
  pages:
    - id: page_general
      sections:
        - id: section_project
          fields:
            - id: project
              display: combobox
              signpostPosition: right-middle
        - id: section_deploymentName
          fields:
            - id: deploymentName
              display: textField
              state:
                visible: false
                read-only: false
              signpostPosition: right-middle
        - id: section_vmHostname
          fields:
            - id: vmHostname
              display: textField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_vcenterName
          fields:
            - id: vcenterName
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_clusterName
          fields:
            - id: clusterName
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_networkName
          fields:
            - id: networkName
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_folderName
          fields:
            - id: folderName
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_04165e03
          fields:
            - id: osVersion
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_vcpuCount
          fields:
            - id: cpuCount
              display: integerField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_memoryGB
          fields:
            - id: memoryGB
              display: integerField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: section_3053b54e
          fields:
            - id: isoPath
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
      title: General
schema:
  project:
    label: Project
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: projects
      type: scriptAction
    constraints:
      required: true
  deploymentName:
    label: Deployment Name
    type:
      dataType: string
      isMultiple: false
    default:
      bind: vmHostname
    constraints:
      required: true
      max-value: 900
  vmHostname:
    label: VM Hostname
    description: >-
      VM display name and guest hostname. Alphanumeric and hyphens only. Max 15
      chars (Windows NetBIOS).
    signpost: >-
      VM display name and guest hostname. Alphanumeric and hyphens only. Max 15
      chars (Windows NetBIOS).
    type:
      dataType: string
      isMultiple: false
    constraints:
      required: true
      min-value: 1
      max-value: 15
      pattern:
        value: ^[a-zA-Z0-9\-]+$
        message: >-
          Constraint Description: must be compliant with ^[a-zA-Z0-9\-]+$
          regular expression.
  vcenterName:
    label: vCenter to which to deploy the VM
    description: Name of the vCenter server where the VM will be deployed
    signpost: Name of the vCenter server where the VM will be deployed
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getVCenterList
      type: scriptAction
      parameters: []
    constraints:
      required: true
  clusterName:
    label: vSphere Cluster Name
    description: Name of the vSphere cluster where the VM is to be created.
    signpost: Name of the vSphere cluster where the VM is to be created.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getClusterList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
    constraints:
      required: true
  networkName:
    label: Network Name
    description: Name of the dvPortgroup to which the VM is to be connected.
    signpost: Name of the dvPortgroup to which the VM is to be connected.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getNetworkList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
        - $type:
            dataType: string
            isMultiple: false
          clusterName: clusterName
    constraints:
      required: true
  folderName:
    label: VM Folder Name
    description: Name of the VM folder where the VM is to be placed.
    signpost: Name of the VM folder where the VM is to be placed.
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getFolderList
      type: scriptAction
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
    constraints:
      required: true
  osVersion:
    label: OS Version
    description: Linux OS version / image to deploy
    signpost: Linux OS version / image to deploy
    type:
      dataType: string
      isMultiple: false
    valueList:
      - value: centos
        label: centos
      - value: ubuntu
        label: ubuntu
    constraints:
      required: true
  cpuCount:
    label: CPU Count
    type:
      dataType: integer
      isMultiple: false
    default: 2
    constraints:
      min-value: 1
      max-value: 64
  memoryGB:
    label: Memory (GB)
    type:
      dataType: integer
      isMultiple: false
    default: 4
    constraints:
      min-value: 1
      max-value: 512
  isoPath:
    label: ISO Image
    description: >-
      ISO to attach and boot from. List is sourced from all datastores reachable
      by the selected cluster's hosts, sorted by datastore, folder, then file.
      Value is the full datastore path, e.g. "[ds-iso] ISOs/rhel9.iso".
    signpost: >-
      ISO to attach and boot from. List is sourced from all datastores reachable
      by the selected cluster's hosts, sorted by datastore, folder, then file.
      Value is the full datastore path, e.g. "[ds-iso] ISOs/rhel9.iso".
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: com.broadcom.pso.vcfa.customforms/getIsoList
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          vcenterName: vcenterName
        - $type:
            dataType: string
            isMultiple: false
          clusterName: clusterName
    constraints:
      required: true
options:
  externalValidations: []
