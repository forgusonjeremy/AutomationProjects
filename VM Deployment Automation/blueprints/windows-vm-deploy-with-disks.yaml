name: windows-vm-deploy-with-disks
version: 1.4
formatVersion: 1

###############################################################################
# Blueprint: windows-vm-deploy-with-disks
# OS:        Windows Server
# Disks:     1–N additional data disks on SCSI Controller 1
# Notes:
#   - OS disk on SCSI_Controller_0 (VCFA default from image mapping)
#   - Additional disks on SCSI_Controller_1; unitNumber matches count.index
#   - disk.EnableUUID = TRUE required on base image template (V3)
#   - Filesystem logic (MBR/GPT, NTFS) handled in workflow_MountFormatDisks_Windows
#   - POST_PROVISION extensibility subscription triggers workflow_VMDeployParent
#   - imageRef: replace win-2025/baseline with your image mapping name
###############################################################################

inputs:
  vmHostname:
    type: string
    title: VM Hostname
    description: "VM display name and guest hostname. Alphanumeric and hyphens only. Max 15 chars (Windows NetBIOS)."
    minLength: 1
    maxLength: 15
    pattern: '^[a-zA-Z0-9\-]+$'

  osType:
    type: string
    title: OS Type
    description: "Operating system type. Used by post-provision workflow."
    default: windows
    enum:
      - windows
    readOnly: true

  clusterName:
    type: string
    title: vSphere Cluster Name
    description: "Name of the vSphere cluster where the VM is to be created."

  networkName:
    type: string
    title: Network Name
    description: "Name of the dvPortgroup to which the VM is to be connected."

  folderName:
    type: string
    title: VM Folder Name
    description: "Name of the VM folder where the VM is to be placed."

  vcpuCount:
    type: integer
    title: vCPU Count
    default: 2
    minimum: 1
    maximum: 64

  memoryGB:
    type: integer
    title: Memory (GB)
    default: 4
    minimum: 1
    maximum: 512

  additionalDisks:
    type: array
    title: Additional Data Disks
    description: "One entry per additional disk. Provisioned in array order on SCSI Controller 1. Disks >= 2048 GB use GPT partition table."
    minItems: 1
    items:
      type: object
      properties:
        driveLetter:
          type: string
          title: Drive Letter
          description: "Single letter D–Z. Do not include colon."
          pattern: '^[D-Zd-z]$'
        driveLabel:
          type: string
          title: Drive Label
          description: "NTFS volume label. Max 32 characters."
          maxLength: 32
        sizeGb:
          type: integer
          title: Size (GB)
          minimum: 1
          maximum: 65536

resources:
  vm:
    type: Cloud.vSphere.Machine
    dependsOn:
      - additionalDisk
    properties:
      name: '${input.vmHostname}'
      imageRef: win-2025/baseline
      cpuCount: '${input.vcpuCount}'
      totalMemoryMB: '${input.memoryGB * 1024}'
      folderName: '${input.folderName}'
      constraints:
        - tag: 'clusterName:${input.clusterName}'
      networks:
        - network: '${resource.network.id}'
          assignment: static
          dns: '${resource.network.dns}'
          gateway: '${resource.network.gateway}'
          domain: '${resource.network.domain}'
          dnsSearchDomains: '${resource.network.dnsSearchDomains}'

  additionalDisk:
    type: Cloud.vSphere.Disk
    allocatePerInstance: true
    count: '${length(input.additionalDisks)}'
    properties:
      capacityGb: '${input.additionalDisks[count.index].sizeGb}'
      SCSIController: SCSI_Controller_1
      unitNumber: '${count.index}'

  network:
    type: Cloud.vSphere.Network
    properties:
      networkType: existing
      constraints:
        - tag: 'networkName:${input.networkName}'
