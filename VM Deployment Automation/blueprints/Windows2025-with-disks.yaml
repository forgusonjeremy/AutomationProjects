formatVersion: 1
inputs:
  vmHostname:
    type: string
    title: VM Hostname
    description: VM display name and guest hostname. Alphanumeric and hyphens only. Max 15 chars (Windows NetBIOS).
    minLength: 1
    maxLength: 15
    pattern: ^[a-zA-Z0-9\-]+$
  vcenterName:
    type: string
    title: vCenter to which to deploy the VM
    description: Name of the vCenter server where the VM will be deployed
  clusterName:
    type: string
    title: vSphere Cluster Name
    description: Name of the vSphere cluster where the VM is to be created.
  networkName:
    type: string
    title: Network Name
    description: Name of the dvPortgroup to which the VM is to be connected.
  folderName:
    type: string
    title: VM Folder Name
    description: Name of the VM folder where the VM is to be placed.
  cpuCount:
    type: integer
    title: CPU Count
    default: 2
    minimum: 1
    maximum: 64
  memoryGB:
    type: integer
    title: Memory (GB)
    default: 4
    minimum: 1
    maximum: 512
  dataDisks:
    type: array
    title: Additional Data Disks
    description: One entry per additional disk. Choose a size and a SCSI controller.
    minItems: 1
    maxItems: 10 # confirm the real ceiling
    items:
      type: object
      properties:
        sizeGb:
          type: integer
          title: Size (GB)
          minimum: 1
        SCSIController:
          type: string
          title: SCSI Controller
          default: SCSI_Controller_1
          enum:
            - SCSI_Controller_1
            - SCSI_Controller_2
            - SCSI_Controller_3
        driveLetter:
          type: string
          pattern: ^[E-XZ]$
          description: Single letter E through Z
        driveLabel:
          type: string
        provisionType:
          type: string
          title: Provisioning Type
          enum:
            - thin
            - thick
            - eagerZeroedThick
          default: thin
#Hidden inputs
  adminAcctConfigElemName:
    type: string
    title: Local Admin Configuration Element Name
    description: Name of the configuration element in Orchestrator containing the administrator account information used in updating the local admin account username and password
  defaultAdminNameAttrName:
    type: string
    title: Default Admin Name Attribute Name
    description: Name of configuration element attribute containing the default administrator account name
  defaultAdminPasswordAttrName:
    type: string
    title: Default Admin Password Attribute Name
    description: Name of the configuration element attribute containing the default administrator account password
  defaultAdminNewNameAttrName:
    type: string
    title: New Default Admin Name Attribute Name
    description: Name of the configuration element attribute containing the new default admin name
  defaultAdminNewPasswordAttrName:
    type: string
    title: New Default Admin Password Attribute Name
    description: Name of the configuration element attribute containing the new password for the default admin account
resources:
  vm:
    type: Cloud.vSphere.Machine
    metadata:
      layoutPosition:
        - 0
        - 0
    properties:
      name: ${input.vmHostname}
      imageRef: win-2025/baseline
      customizationSpec: win-2025
      cpuCount: ${input.cpuCount}
      totalMemoryMB: ${input.memoryGB * 1024}
      folderName: ${input.folderName}
      adminActConfigElemName: ${input.adminAcctConfigElemName}
      defaultAdminAttr: ${input.defaultAdminNameAttrName}
      defaultAdminPwAttr: ${input.defaultAdminPasswordAttrName}
      defaultAdminNewNameAttr: ${input.defaultAdminNewNameAttrName}
      defaultAdminNewPwAttr: ${input.defaultAdminNewPasswordAttrName}
      dataDisks: ${input.dataDisks}
      osType: windows
      constraints:
        - tag: clusterName:${input.clusterName}
      attachedDisks: ${map_to_object(resource.DataDisk[*].id, "source")}
      networks:
        - network: ${resource.network.id}
          assignment: static
          dns: ${resource.network.dns}
          gateway: ${resource.network.gateway}
          domain: ${resource.network.domain}
          dnsSearchDomains: ${resource.network.dnsSearchDomains}
  network:
    type: Cloud.vSphere.Network
    metadata:
      layoutPosition:
        - 1
        - 0
    properties:
      networkType: existing
      constraints:
        - tag: networkName:${input.networkName}
  DataDisk:
    type: Cloud.vSphere.Disk
    metadata:
      layoutPosition:
        - 0
        - 1
    allocatePerInstance: true
    properties:
      capacityGb: ${input.dataDisks[count.index].sizeGb}
      SCSIController: ${input.dataDisks[count.index].SCSIController}
      count: ${length(input.dataDisks)}
      provisioningType: ${input.dataDisks[count.index].provisionType}
